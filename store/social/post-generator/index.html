<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Post Generator — FreeMarketingStore</title>
  <meta name="description" content="Generate platform-specific social media posts with 30+ templates, viral hooks, hashtag suggestions, and character counting.">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Manrope', system-ui, sans-serif;
      background: #fafafa;
      color: #1a1a1a;
      min-height: 100vh;
    }
    nav {
      display: flex; align-items: center; justify-content: space-between;
      max-width: 900px; margin: 0 auto; padding: 1rem 1.5rem;
      border-bottom: 1px solid #e5e7eb;
    }
    .nav-brand {
      display: flex; align-items: center; gap: 0.5rem;
      font-weight: 700; font-size: 0.95rem; text-decoration: none; color: #1a1a1a;
    }
    .nav-brand img { width: 24px; height: 24px; }
    .nav-back { font-size: 0.85rem; color: #6b7280; text-decoration: none; }
    .nav-back:hover { color: #f97316; }

    .container { max-width: 740px; margin: 0 auto; padding: 2rem 1.5rem; }
    h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.5rem; }
    .subtitle { color: #6b7280; font-size: 0.95rem; margin-bottom: 2rem; }

    .form-group { margin-bottom: 1.25rem; }
    .form-group label {
      display: block; font-size: 0.82rem; font-weight: 600;
      color: #6b7280; margin-bottom: 0.4rem;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 0.7rem 1rem;
      border: 1px solid #e5e7eb; border-radius: 8px;
      font-family: inherit; font-size: 0.9rem; background: #ffffff;
    }
    .form-group textarea { resize: vertical; min-height: 70px; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: none; border-color: #f97316;
    }

    .platform-tabs {
      display: flex; gap: 0.5rem; margin-bottom: 1.25rem; flex-wrap: wrap;
    }
    .platform-tab {
      padding: 0.5rem 1rem; border-radius: 20px;
      border: 1px solid #e5e7eb; background: #ffffff;
      font-size: 0.82rem; font-weight: 500; cursor: pointer;
      font-family: inherit; transition: all 0.2s; color: #6b7280;
    }
    .platform-tab:hover { border-color: #f97316; color: #f97316; }
    .platform-tab.active { background: #f97316; color: #fff; border-color: #f97316; }

    .chip-grid {
      display: flex; flex-wrap: wrap; gap: 0.4rem;
    }
    .chip-btn {
      padding: 0.45rem 0.85rem; border-radius: 8px; border: 1px solid #e5e7eb;
      background: #ffffff; font-size: 0.78rem; font-weight: 500;
      cursor: pointer; font-family: inherit; text-align: center;
      transition: all 0.2s; color: #6b7280;
    }
    .chip-btn:hover { border-color: #f97316; color: #f97316; }
    .chip-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

    .row-2 { display: flex; gap: 0.75rem; }
    .row-2 > .form-group { flex: 1; }

    .btn-generate {
      width: 100%; padding: 0.8rem; border-radius: 8px; border: none;
      background: #f97316; color: #fff; font-family: inherit;
      font-size: 0.9rem; font-weight: 600; cursor: pointer;
      margin-top: 0.5rem; transition: background 0.2s;
    }
    .btn-generate:hover { background: #ea580c; }

    .btn-variations {
      width: 100%; padding: 0.65rem; border-radius: 8px;
      border: 1px solid #e5e7eb; background: #ffffff;
      font-family: inherit; font-size: 0.85rem; font-weight: 600;
      cursor: pointer; margin-top: 0.5rem; transition: all 0.2s;
    }
    .btn-variations:hover { border-color: #f97316; color: #f97316; }

    .results { margin-top: 2rem; display: none; }
    .results.visible { display: block; }
    .results-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1rem;
    }
    .results-header h2 { font-size: 1.1rem; font-weight: 600; }
    .results-count { font-size: 0.78rem; color: #6b7280; }

    .post-card {
      background: #ffffff; border: 1px solid #e5e7eb; border-radius: 10px;
      padding: 1.25rem; margin-bottom: 1rem; position: relative;
    }
    .post-card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 0.5rem;
    }
    .post-card-label {
      font-size: 0.72rem; font-weight: 600; color: #6b7280;
      text-transform: uppercase; letter-spacing: 0.03em;
    }
    .post-card .post-text {
      font-size: 0.9rem; line-height: 1.65; margin-bottom: 0.75rem; white-space: pre-wrap;
    }
    .post-card .post-meta {
      display: flex; justify-content: space-between; align-items: center;
    }
    .char-bar-wrap {
      display: flex; align-items: center; gap: 0.5rem; flex: 1; margin-right: 1rem;
    }
    .char-text { font-size: 0.72rem; color: #6b7280; white-space: nowrap; }
    .char-text.over { color: #ef4444; font-weight: 600; }
    .char-bar {
      flex: 1; max-width: 120px; height: 5px; background: #e5e7eb;
      border-radius: 3px; overflow: hidden;
    }
    .char-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
    .char-fill.green { background: #16a34a; }
    .char-fill.yellow { background: #f59e0b; }
    .char-fill.red { background: #ef4444; }

    .copy-btn {
      font-family: inherit; font-size: 0.78rem; padding: 0.4rem 0.8rem;
      border-radius: 6px; border: 1px solid #e5e7eb; background: #fff;
      cursor: pointer; font-weight: 500; transition: all 0.2s; white-space: nowrap;
    }
    .copy-btn:hover { border-color: #f97316; color: #f97316; }
    .copy-btn.copied { background: #f97316; color: #fff; border-color: #f97316; }

    .hashtags-section {
      margin-top: 1.5rem; padding: 1.25rem;
      background: #ffffff; border: 1px solid #e5e7eb; border-radius: 10px;
    }
    .hashtags-section h3 { font-size: 0.9rem; font-weight: 600; margin-bottom: 0.5rem; }
    .hashtags-platform { margin-bottom: 0.75rem; }
    .hashtags-platform-label { font-size: 0.72rem; font-weight: 600; color: #6b7280; margin-bottom: 0.3rem; }
    .hashtag-list { display: flex; flex-wrap: wrap; gap: 0.35rem; }
    .hashtag {
      background: #fff7ed; color: #f97316; padding: 0.25rem 0.55rem;
      border-radius: 4px; font-size: 0.75rem; font-weight: 500; cursor: pointer;
      transition: all 0.15s;
    }
    .hashtag:hover { background: #f97316; color: #fff; }
    .hashtag.copied { background: #f97316; color: #fff; }
    .copy-all-tags {
      display: inline-block; margin-top: 0.5rem; font-size: 0.72rem;
      color: #6b7280; cursor: pointer; text-decoration: underline;
    }
    .copy-all-tags:hover { color: #f97316; }

    .history-section {
      margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid #e5e7eb;
    }
    .history-section h3 {
      font-size: 1rem; font-weight: 600; margin-bottom: 0.75rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .history-clear {
      font-size: 0.75rem; color: #6b7280; cursor: pointer; border: none;
      background: none; font-family: inherit; text-decoration: underline;
    }
    .history-clear:hover { color: #ef4444; }
    .history-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.55rem 0.75rem; border: 1px solid #e5e7eb; border-radius: 8px;
      margin-bottom: 0.4rem; background: #ffffff; cursor: pointer;
      font-size: 0.82rem; transition: border-color 0.2s;
    }
    .history-item:hover { border-color: #f97316; }
    .history-topic { font-weight: 500; flex: 1; }
    .history-badges { display: flex; gap: 0.4rem; align-items: center; }
    .history-badge {
      font-size: 0.65rem; padding: 0.12rem 0.4rem; border-radius: 3px;
      background: #f3f4f6; color: #6b7280; font-weight: 500;
    }
    .history-empty { font-size: 0.85rem; color: #9ca3af; }

    @media (max-width: 500px) {
      .row-2 { flex-direction: column; gap: 0; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-brand"><img src="/favicon.svg" alt="FMS"><span>FreeMarketingStore</span></a>
    <a href="/" class="nav-back">&larr; All tools</a>
  </nav>

  <div class="container">
    <h1>Social Post Generator</h1>
    <p class="subtitle">Generate platform-native posts with 30+ templates per platform, viral hooks, and smart hashtag suggestions.</p>

    <div class="form-group">
      <label>Platform</label>
      <div class="platform-tabs" id="platforms"></div>
    </div>

    <div class="form-group">
      <label>Topic or Product</label>
      <input type="text" id="topic" placeholder="e.g., New project management tool for remote teams">
    </div>

    <div class="form-group">
      <label>Key Points (optional)</label>
      <textarea id="key-points" placeholder="Any specific features, benefits, or CTAs to include..."></textarea>
    </div>

    <div class="row-2">
      <div class="form-group">
        <label>Tone</label>
        <div class="chip-grid" id="tones"></div>
      </div>
      <div class="form-group">
        <label>Post Style</label>
        <div class="chip-grid" id="styles"></div>
      </div>
    </div>

    <div class="form-group">
      <label>Viral Hook (optional — adds a strong opening)</label>
      <div class="chip-grid" id="hooks"></div>
    </div>

    <button class="btn-generate" id="generate-btn">Generate Posts</button>
    <button class="btn-variations" id="variations-btn" style="display:none">Generate 5 More Variations</button>

    <div class="results" id="results">
      <div class="results-header">
        <h2>Generated Posts</h2>
        <span class="results-count" id="results-count"></span>
      </div>
      <div id="posts-list"></div>
      <div class="hashtags-section" id="hashtags-section"></div>
    </div>

    <div class="history-section">
      <h3>
        Generation History
        <button class="history-clear" id="history-clear">Clear</button>
      </h3>
      <div id="history-list"></div>
    </div>
  </div>

  <script>
    // --- Config ---
    const platforms = [
      { id: 'twitter', name: 'X / Twitter', limit: 280 },
      { id: 'linkedin', name: 'LinkedIn', limit: 3000 },
      { id: 'instagram', name: 'Instagram', limit: 2200 },
      { id: 'facebook', name: 'Facebook', limit: 5000 },
      { id: 'tiktok', name: 'TikTok', limit: 2200 }
    ];
    const tones = ['Professional', 'Casual', 'Funny', 'Inspirational', 'Bold', 'Educational'];
    const postStyles = ['Thread Starter', 'Hot Take', 'Tip/How-To', 'Question', 'Story', 'Announcement', 'Data Insight', 'Contrarian'];
    const hookTypes = [
      { id: 'none', label: 'None' },
      { id: 'contrarian', label: 'Contrarian' },
      { id: 'data', label: 'Data-driven' },
      { id: 'personal', label: 'Personal story' },
      { id: 'question', label: 'Question' }
    ];

    let selectedPlatform = 'twitter';
    let selectedTone = 'Professional';
    let selectedStyle = 'Thread Starter';
    let selectedHook = 'none';
    let generatedPosts = [];
    const HISTORY_KEY = 'fms-postgen-history';
    let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');

    // --- Render controls ---
    function renderPlatforms() {
      document.getElementById('platforms').innerHTML = platforms.map(p =>
        `<button class="platform-tab ${selectedPlatform === p.id ? 'active' : ''}" data-id="${p.id}">${p.name}</button>`
      ).join('');
      document.querySelectorAll('.platform-tab').forEach(btn => {
        btn.addEventListener('click', () => { selectedPlatform = btn.dataset.id; renderPlatforms(); });
      });
    }

    function renderChips(containerId, items, selected, setter) {
      const el = document.getElementById(containerId);
      el.innerHTML = items.map(item => {
        const val = typeof item === 'string' ? item : item.id;
        const label = typeof item === 'string' ? item : item.label;
        return `<button class="chip-btn ${selected === val ? 'active' : ''}" data-val="${val}">${label}</button>`;
      }).join('');
      el.querySelectorAll('.chip-btn').forEach(btn => {
        btn.addEventListener('click', () => { setter(btn.dataset.val); renderChips(containerId, items, btn.dataset.val, setter); });
      });
    }

    renderPlatforms();
    renderChips('tones', tones, selectedTone, v => selectedTone = v);
    renderChips('styles', postStyles, selectedStyle, v => selectedStyle = v);
    renderChips('hooks', hookTypes, selectedHook, v => selectedHook = v);

    // --- 30+ templates per platform ---
    // Template functions receive (topic, point, audience, tone)
    // They return the post text

    function getHookPrefix(topic) {
      const hooks = {
        contrarian: [
          `Unpopular opinion: everything you know about ${topic} is wrong.`,
          `I am going to say something controversial about ${topic}.`,
          `Hot take: the "best practice" for ${topic} is actually the worst practice.`
        ],
        data: [
          `I analyzed 500+ data points on ${topic}. Here is what I found:`,
          `The data on ${topic} tells a story most people are ignoring:`,
          `87% of people get ${topic} wrong. Here is the proof:`
        ],
        personal: [
          `I failed at ${topic} for 2 years before I figured this out.`,
          `The most expensive lesson I learned about ${topic}:`,
          `3 years ago, ${topic} almost broke me. Here is what changed:`
        ],
        question: [
          `What if everything you know about ${topic} is wrong?`,
          `Why are smart people still struggling with ${topic}?`,
          `Be honest: are you actually good at ${topic}?`
        ],
        none: ['']
      };
      const set = hooks[selectedHook] || hooks.none;
      return set[Math.floor(Math.random() * set.length)];
    }

    const templateBank = {
      twitter: {
        'Thread Starter': [
          (t,p) => `${t} changed how I think about everything.\n\nHere are 7 lessons that took me years to learn:\n\n[Thread]`,
          (t,p) => `I spent 6 months studying ${t}.\n\nThe #1 insight: ${p}\n\nHere is the full breakdown:`,
          (t,p) => `Everyone talks about ${t}.\n\nNobody talks about the parts that actually matter.\n\nA thread on what I wish someone told me:`,
          (t,p) => `The ${t} playbook most people follow is outdated.\n\nHere is what is working in 2024:\n\n${p}`,
          (t,p) => `Thread: Everything I know about ${t} after 5 years.\n\nSpoiler: it is simpler than you think.\n\n1/${p}`
        ],
        'Hot Take': [
          (t,p) => `${t} is overrated.\n\nThere, I said it.\n\nHere is what actually works: ${p}`,
          (t,p) => `Unpopular opinion: ${t} does not need to be complicated.\n\nThe industry made it complicated to sell you stuff.\n\n${p}`,
          (t,p) => `Stop doing ${t} the way everyone tells you to.\n\nThe conventional wisdom is wrong.\n\n${p}`,
          (t,p) => `${t} "experts" do not want you to know this:\n\n${p}\n\nBookmark this before they come for me.`,
          (t,p) => `Hot take: you do not need ${t}.\n\nWhat you need: ${p}\n\nDifferent things.`
        ],
        'Tip/How-To': [
          (t,p) => `Quick ${t} tip:\n\n${p}\n\nTry it today. Report back.`,
          (t,p) => `The simplest way to get better at ${t}:\n\n${p}\n\nNo course needed. No tools needed. Just this.`,
          (t,p) => `Free ${t} hack:\n\n${p}\n\nSave this tweet. You will need it.`,
          (t,p) => `1-minute ${t} tutorial:\n\nStep 1: ${p}\nStep 2: Track results for 30 days\nStep 3: Double down on what works\n\nThat is the entire strategy.`,
          (t,p) => `${t} cheat code:\n\nMost people: [complicated approach]\nYou (after reading this): ${p}\n\nYou are welcome.`
        ],
        'Question': [
          (t,p) => `What is the biggest myth about ${t}?\n\nI will go first: ${p}\n\nYour turn.`,
          (t,p) => `Real question: what is stopping you from mastering ${t}?\n\nBe specific. I read every reply.`,
          (t,p) => `If you could fix ONE thing about ${t}, what would it be?\n\nMine: ${p}`,
          (t,p) => `Debate time: is ${t} getting better or worse?\n\nI think: ${p}\n\nConvince me otherwise.`,
          (t,p) => `Poll: What matters most for ${t}?\n\n- Speed\n- Quality\n- Cost\n- ${p}\n\nReply with your answer.`
        ],
        'Story': [
          (t,p) => `Last year, I was terrible at ${t}.\n\nToday? ${p}.\n\nHere is the one change that made the difference:`,
          (t,p) => `True story about ${t}:\n\nI tried the "expert" approach for 6 months. Zero results.\n\nThen I simplified to: ${p}\n\nResults within 2 weeks.`,
          (t,p) => `My ${t} journey in 4 tweets:\n\n2020: "What even is this?"\n2021: "This is impossible"\n2022: "Wait, I think I get it"\n2023: "${p}"\n\nThe compound effect is real.`,
          (t,p) => `I almost gave up on ${t}.\n\nThe turning point: ${p}\n\nSmall change. Massive results.`,
          (t,p) => `Plot twist in my ${t} journey:\n\nThe thing I thought was my biggest weakness turned into my biggest advantage.\n\n${p}`
        ],
        'Announcement': [
          (t,p) => `Big news: ${t} just got better.\n\n${p}\n\nLink in bio for details.`,
          (t,p) => `We just launched something for ${t}.\n\nIt does one thing: ${p}\n\nAnd it does it really, really well.`,
          (t,p) => `Announcement: ${t}\n\n${p}\n\nWe have been working on this for months. Incredibly proud of the team.`,
          (t,p) => `It is official: ${t} is live.\n\n${p}\n\nRetweet if you are trying it today.`,
          (t,p) => `After months of work: ${t}.\n\nWhat makes it different: ${p}\n\nFree to try. No strings.`
        ],
        'Data Insight': [
          (t,p) => `I analyzed 100+ examples of ${t}.\n\nThe #1 pattern: ${p}\n\nThe bottom 10% all ignored this.`,
          (t,p) => `${t} by the numbers:\n\n- 73% of people do it wrong\n- The top 10% all share one trait: ${p}\n- Average ROI: 3.2x\n\nData does not lie.`,
          (t,p) => `Surprising stat about ${t}:\n\n${p}\n\nSource: [link]\n\nThis changes the strategy completely.`,
          (t,p) => `I tracked ${t} results for 90 days.\n\nDay 1-30: Minimal impact\nDay 31-60: Early signs of ${p}\nDay 90: 4x improvement\n\nPatience pays.`
        ],
        'Contrarian': [
          (t,p) => `Everyone says ${t} is essential.\n\nI disagree.\n\nHere is why: ${p}`,
          (t,p) => `${t} advice I refuse to follow:\n\n"Do X"\n"Always Y"\n"Never Z"\n\nInstead: ${p}\n\nResults speak louder than rules.`,
          (t,p) => `The ${t} industry has a dirty secret:\n\n${p}\n\nNobody talks about this because it does not sell courses.`,
          (t,p) => `Contrarian ${t} take:\n\nDo less. Way less.\n\n${p}\n\nSimplicity is the ultimate sophistication.`
        ]
      },
      linkedin: {
        'Thread Starter': [
          (t,p) => `I have been thinking about ${t} a lot lately.\n\nHere is what most people get wrong:\n\nThey focus on tactics instead of fundamentals.\n\n${p}\n\nThe real question is not "what tools should I use?" but "what problem am I actually solving?"\n\nAfter 5 years of working with teams on ${t}, here are 5 principles that consistently matter:\n\n1. Start with the outcome, work backward\n2. Measure what matters, ignore vanity metrics\n3. ${p}\n4. Review weekly, adjust monthly, commit quarterly\n5. Build systems, not campaigns\n\nWhich one resonates most with you?`,
          (t,p) => `I asked 50 leaders about their approach to ${t}.\n\nThe answers surprised me.\n\nHere is what the top performers had in common:\n\n${p}\n\nNone of them mentioned the "obvious" things.\n\nThe full breakdown:`,
          (t,p) => `Let me share what nobody told me about ${t} when I started.\n\nThe advice I kept hearing: "Just do more."\n\nWhat actually worked: ${p}\n\nQuality over quantity. Every single time.\n\nHere is the framework I use now:`,
          (t,p) => `${t} is not what it was 3 years ago.\n\nThe old playbook: [generic tactics]\nThe new playbook: ${p}\n\nThe teams that adapted early are now 2-3 years ahead.\n\nHere is what changed and why it matters:`,
          (t,p) => `A counterintuitive lesson from ${t}:\n\nThe less I tried to optimize, the better results I got.\n\n${p}\n\nSometimes the best strategy is subtraction, not addition.\n\nHere are 5 things I stopped doing (and the results):`,
        ],
        'Hot Take': [
          (t,p) => `I am going to say something that might be unpopular.\n\n${t} does not need to be this hard.\n\nThe industry has overcomplicated it for one reason: to sell you solutions to problems you do not actually have.\n\nThe truth: ${p}\n\nAgree or disagree?`,
          (t,p) => `Hot take: 90% of ${t} advice is designed to sell you something, not help you.\n\nHere is what actually works:\n\n${p}\n\nNo certification required. No $2,000 course needed.\n\nThe information is free. The execution costs effort.\n\nTag someone who needs to hear this.`,
          (t,p) => `Controversial opinion about ${t}:\n\nMost "best practices" are just "average practices" that everyone agreed on.\n\nThe people winning right now? They are doing the opposite.\n\n${p}\n\nWhat is your contrarian take?`,
        ],
        'Tip/How-To': [
          (t,p) => `Simple ${t} tip that took me years to learn:\n\n${p}\n\nI know it sounds basic. That is the point.\n\nThe most effective strategies usually are.\n\nHere is how to implement it this week:\n\n1. Block 30 minutes on your calendar\n2. Audit your current approach\n3. Apply this one change\n4. Measure for 30 days before judging\n\nSave this post. Come back to it on Monday.`,
          (t,p) => `The ${t} framework I share with every team I work with:\n\n1. Define the outcome (not the activity)\n2. ${p}\n3. Measure weekly, adjust monthly\n4. Cut everything that does not directly contribute\n\nSimple. Not easy. But simple.\n\nWhat framework do you use?`,
          (t,p) => `I just saved a client 10 hours/week on ${t}.\n\nThe change: ${p}\n\nNo new tools. No additional budget. Just a different approach.\n\nHere is exactly what we did:`,
        ],
        'Question': [
          (t,p) => `I am genuinely curious:\n\nWhat is the one thing about ${t} that frustrates you most?\n\nFor me, it is: ${p}\n\nBe specific in the comments. I will reply to every answer with my perspective.`,
          (t,p) => `Quick poll for my network:\n\nWhen it comes to ${t}, what matters more?\n\nA) Speed of execution\nB) Quality of output\nC) ${p}\nD) Something else (comment below)\n\nI have a follow-up post based on the results.`,
        ],

    // --- Platform-specific hashtag banks ---

    // --- Generate posts ---
    function generatePosts(extra) {
      const topic = document.getElementById('topic').value.trim();
      if (!topic) { document.getElementById('topic').focus(); return; }
      const keyPoints = document.getElementById('key-points').value.trim();
      const point = keyPoints || 'it simplifies everything and saves hours every week';
      const platform = platforms.find(p => p.id === selectedPlatform);

      // Get templates for this platform + style
      const platformTemplates = templateBank[selectedPlatform] || {};
      let styleTpls = platformTemplates[selectedStyle] || [];

      // If style has no templates for this platform, fall back to all templates
      if (styleTpls.length === 0) {
        styleTpls = Object.values(platformTemplates).flat();
      }

      // Shuffle and pick 5
      const shuffled = [...styleTpls].sort(() => Math.random() - 0.5);
      const selected = shuffled.slice(0, 5);

      // Generate
      const hookPrefix = getHookPrefix(topic);
      const posts = selected.map((tpl, i) => {
        let text = tpl(topic, point);
        if (hookPrefix && i === 0) {
          text = hookPrefix + '\n\n' + text;
        }
        // Apply tone adjustments
        if (selectedTone === 'Casual') {
          text = text.replace(/\bI am\b/g, "I'm").replace(/\bdo not\b/g, "don't").replace(/\bcannot\b/g, "can't").replace(/\bIt is\b/g, "It's").replace(/\bHere is\b/g, "Here's").replace(/\bThat is\b/g, "That's");
        }
        return text;
      });

      // If we need more posts from remaining styles
      if (posts.length < 5) {
        const otherTpls = Object.values(platformTemplates).flat().filter(t => !selected.includes(t));
        const extra2 = otherTpls.sort(() => Math.random() - 0.5).slice(0, 5 - posts.length);
        extra2.forEach(tpl => posts.push(tpl(topic, point)));
      }

      if (extra) {
        generatedPosts = [...generatedPosts, ...posts];
      } else {
        generatedPosts = posts;
      }

      renderPosts(platform);
      renderHashtags(topic);
      document.getElementById('results').classList.add('visible');
      document.getElementById('variations-btn').style.display = 'block';
      document.getElementById('results-count').textContent = `${generatedPosts.length} posts generated`;

      // Save to history
      if (!extra) {
        saveHistory(topic, selectedPlatform, selectedTone, selectedStyle, generatedPosts.length);
      }
    }

    function renderPosts(platform) {
      const postsList = document.getElementById('posts-list');
      postsList.innerHTML = generatedPosts.map((text, i) => {
        const len = text.length;
        const pct = Math.min(100, (len / platform.limit) * 100);
        let barColor = 'green';
        if (pct > 90) barColor = 'red';
        else if (pct > 70) barColor = 'yellow';

        const styleLabel = i < 5 ? selectedStyle : 'Variation';

        return `<div class="post-card">
          <div class="post-card-header">
            <span class="post-card-label">${styleLabel} #${(i % 5) + 1}</span>
          </div>
          <div class="post-text">${escapeHtml(text)}</div>
          <div class="post-meta">
            <div class="char-bar-wrap">
              <div class="char-bar"><div class="char-fill ${barColor}" style="width:${pct}%"></div></div>
              <span class="char-text ${len > platform.limit ? 'over' : ''}">${len}/${platform.limit}${len > platform.limit ? ' (over!)' : ''}</span>
            </div>
            <button class="copy-btn" data-index="${i}">Copy</button>
          </div>
        </div>`;
      }).join('');

      postsList.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.dataset.index);
          navigator.clipboard.writeText(generatedPosts[idx]).then(() => {
            btn.textContent = 'Copied!';
            btn.classList.add('copied');
            setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
          });
        });
      });
    }

    function renderHashtags(topic) {
      const bank = hashtagBank[selectedPlatform] || {};
      const topicWords = topic.toLowerCase().split(/\s+/).slice(0, 3);
      const topicTags = topicWords.map(w => `#${w.replace(/[^a-z0-9]/g, '')}`).filter(h => h.length > 2);

      let html = '<h3>Suggested Hashtags</h3>';
      const categories = Object.entries(bank);
      if (categories.length > 0) {
        categories.forEach(([cat, tags]) => {
          html += `<div class="hashtags-platform">
            <div class="hashtags-platform-label">${cat.charAt(0).toUpperCase() + cat.slice(1)}</div>
            <div class="hashtag-list">
              ${tags.map(h => `<span class="hashtag" data-tag="${h}">${h}</span>`).join('')}
            </div>
          </div>`;
        });
      }
      // Topic-specific tags
      if (topicTags.length > 0) {
        html += `<div class="hashtags-platform">
          <div class="hashtags-platform-label">Topic-specific</div>
          <div class="hashtag-list">
            ${topicTags.map(h => `<span class="hashtag" data-tag="${h}">${h}</span>`).join('')}
          </div>
        </div>`;
      }

      // Copy all button
      const allTags = [...topicTags, ...Object.values(bank).flat()];
      const recommended = allTags.slice(0, selectedPlatform === 'instagram' ? 20 : 8);
      html += `<div class="copy-all-tags" id="copy-all-tags" data-tags="${recommended.join(' ')}">Copy all recommended (${recommended.length})</div>`;

      document.getElementById('hashtags-section').innerHTML = html;

      // Click handlers
      document.querySelectorAll('.hashtag').forEach(tag => {
        tag.addEventListener('click', () => {
          navigator.clipboard.writeText(tag.dataset.tag);
          tag.classList.add('copied');
          setTimeout(() => tag.classList.remove('copied'), 1000);
        });
      });

      const copyAll = document.getElementById('copy-all-tags');
      if (copyAll) {
        copyAll.addEventListener('click', () => {
          navigator.clipboard.writeText(copyAll.dataset.tags);
          copyAll.textContent = 'Copied!';
          setTimeout(() => copyAll.textContent = `Copy all recommended (${recommended.length})`, 2000);
        });
      }
    }

    function escapeHtml(text) {
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // --- History ---
    function saveHistory(topic, platform, tone, style, count) {
      history.unshift({ topic, platform, tone, style, count, time: Date.now() });
      if (history.length > 15) history = history.slice(0, 15);
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
      renderHistory();
    }

    function renderHistory() {
      const list = document.getElementById('history-list');
      if (!history.length) {
        list.innerHTML = '<p class="history-empty">No generations yet.</p>';
        return;
      }
      list.innerHTML = history.map((h, i) => `
        <div class="history-item" data-idx="${i}">
          <span class="history-topic">${escapeHtml(h.topic)}</span>
          <span class="history-badges">
            <span class="history-badge">${h.platform}</span>
            <span class="history-badge">${h.tone}</span>
            <span class="history-badge">${h.style || ''}</span>
            <span class="history-badge">${new Date(h.time).toLocaleDateString()}</span>
          </span>
        </div>
      `).join('');
    }

    document.getElementById('history-clear').addEventListener('click', () => {
      history = [];
      localStorage.removeItem(HISTORY_KEY);
      renderHistory();
    });

    // --- Event listeners ---
    document.getElementById('generate-btn').addEventListener('click', () => generatePosts(false));
    document.getElementById('variations-btn').addEventListener('click', () => generatePosts(true));

    renderHistory();
  </script>
