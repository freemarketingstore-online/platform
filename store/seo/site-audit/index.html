<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Audit - FreeMarketingStore</title>
  <meta name="description" content="Run the FreeMarketingStore website audit inside the installable FMS console PWA.">
  <link rel="canonical" href="https://freemarketingstore.pages.dev/console/audit/">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#f97316">
  <script>
    const target = new URL('/console/audit/', window.location.origin);
    target.search = window.location.search;
    window.location.replace(target.href);
  </script>
</head>
<body>
  <main>
    <h1>Website Audit</h1>
    <p>The website audit now runs inside the FMS console PWA.</p>
    <p><a id="audit-link" href="/console/audit/">Open Website Audit</a></p>
  </main>
  <script>
    document.getElementById('audit-link').href = '/console/audit/' + window.location.search;
  </script>
</body>
</html>
