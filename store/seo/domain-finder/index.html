<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Domain Name Generator & Checker - FreeMarketingStore</title>
<meta name="description" content="Generate and check domain names. Full history, per-name controls, 34 TLDs. Chrome AI enhanced.">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--accent:#f97316;--bg:#fafafa;--text:#1a1a1a;--muted:#6b7280;--panel:#ffffff;--line:#e5e7eb;--green:#16a34a;--red:#dc2626;--yellow:#ca8a04}
body{font-family:'Manrope',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--accent);text-decoration:none}
.back{position:fixed;top:12px;left:12px;z-index:99;font-size:.8rem;font-weight:600;opacity:.7}.back:hover{opacity:1}
h1{text-align:center;margin:20px 0 4px;font-size:1.5rem;font-weight:700}
.sub{text-align:center;color:var(--muted);font-size:.85rem;margin-bottom:16px}
.container{max-width:900px;margin:0 auto;padding:0 16px 40px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.panel h3{font-size:.88rem;font-weight:700;margin-bottom:10px}
label{font-size:.75rem;color:var(--muted);display:block;margin-bottom:4px;font-weight:500}
input[type=text],textarea{width:100%;padding:8px 12px;border:1px solid var(--line);border-radius:8px;font-size:.88rem;font-family:inherit;background:var(--panel)}
input:focus,textarea:focus{outline:none;border-color:var(--accent)}
textarea{resize:vertical;min-height:60px}
.row{display:flex;gap:8px}
.row>*{flex:1}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
.chip{padding:5px 12px;border-radius:20px;border:1px solid var(--line);font-size:.78rem;font-weight:500;cursor:pointer;background:var(--panel);transition:.15s}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.chip:hover:not(.active){border-color:var(--accent)}
.btn{padding:8px 18px;border-radius:8px;border:none;font-family:inherit;font-size:.85rem;font-weight:600;cursor:pointer;transition:.15s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#ea580c}
.btn-secondary{background:var(--panel);border:1px solid var(--line);color:var(--text)}.btn-secondary:hover{border-color:var(--accent)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-note{font-size:.72rem;color:var(--muted);margin:6px 0;display:flex;align-items:center;gap:6px}
.ai-dot{width:6px;height:6px;border-radius:50%;background:#d1d5db}.ai-dot.on{background:#22c55e}

/* Name cards */
.names-list{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.name-card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 16px;transition:border-color .15s}
.name-card:hover{border-color:var(--accent)}
.name-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.name-text{font-size:1.05rem;font-weight:700;flex:1}
.name-actions{display:flex;gap:4px}
.name-actions .btn{padding:4px 10px;font-size:.7rem}
.tld-row{display:flex;gap:4px;flex-wrap:wrap}
.tld-badge{font-size:.68rem;padding:3px 8px;border-radius:4px;font-weight:600;text-decoration:none;cursor:pointer;transition:.15s;display:inline-block}
.tld-badge:hover{transform:scale(1.05);box-shadow:0 2px 6px rgba(0,0,0,.08)}
.tld-badge.available{background:#dcfce7;color:#166534}
.tld-badge.taken{background:#fee2e2;color:#991b1b}
.tld-badge.uncertain{background:#fef9c3;color:#854d0e}
.tld-badge.checking{background:#f3f4f6;color:#6b7280}
.tld-badge.unchecked{background:#f9fafb;color:#9ca3af;border:1px dashed #d1d5db}
.add-tld-input{width:80px;padding:3px 8px;font-size:.7rem;border:1px dashed var(--line);border-radius:4px;background:transparent}
.name-meta{font-size:.65rem;color:var(--muted);margin-top:6px}
.name-note{font-size:.72rem;color:var(--muted);margin-top:4px;font-style:italic}

/* History panel */
.history-panel{margin-top:20px}
.history-panel h3{font-size:.9rem;margin-bottom:8px}
.history-items{display:flex;flex-direction:column;gap:6px;max-height:300px;overflow-y:auto}
.history-item{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px 14px;cursor:pointer;transition:.15s}
.history-item:hover{border-color:var(--accent)}
.history-item-name{font-weight:700;font-size:.9rem}
.history-item-meta{font-size:.68rem;color:var(--muted);margin-top:2px}
.history-item-tlds{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px}
.history-item-tlds .tld-badge{font-size:.6rem;padding:2px 5px}
.empty-state{text-align:center;padding:30px;color:var(--muted);font-size:.85rem}

footer{text-align:center;padding:20px;font-size:.68rem;color:var(--muted)}
footer a{color:var(--accent)}
</style>
</head>
<body>
<a class="back" href="/">Back to Store</a>
<h1>Domain Name Finder</h1>
<p class="sub">Generate names, check per-name, add TLDs, full history. Everything saved locally.</p>

<div class="container">
<div class="panel">
<h3>Describe your project</h3>
<textarea id="desc" placeholder="e.g., Electric semi trucks — tough and durable brand for logistics companies"></textarea>
<div class="row" style="margin-top:8px">
<div><label>Keyword 1</label><input type="text" id="kw1" placeholder="e.g., truck"></div>
<div><label>Keyword 2</label><input type="text" id="kw2" placeholder="e.g., electric"></div>
<div><label>Keyword 3</label><input type="text" id="kw3" placeholder="e.g., haul"></div>
</div>
<label style="margin-top:10px">Style</label>
<div class="chips" id="styleChips">
<span class="chip active" data-s="short">Short</span>
<span class="chip active" data-s="brandable">Brandable</span>
<span class="chip" data-s="descriptive">Descriptive</span>
<span class="chip" data-s="creative">Creative</span>
</div>
<div class="ai-note"><span class="ai-dot" id="aiDot"></span><span id="aiText">Checking Chrome AI...</span></div>
<button class="btn btn-primary" id="genBtn" style="width:100%;margin-top:10px">Generate Names</button>
</div>

<div id="namesArea" style="display:none">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
<h3 style="font-size:1rem" id="namesCount">0 names</h3>
<div style="display:flex;gap:6px">
<button class="btn btn-secondary" id="checkAllBtn" style="font-size:.72rem">Check All (.com)</button>
<button class="btn btn-secondary" id="exportBtn" style="font-size:.72rem">Export Available</button>
</div>
</div>
<div class="names-list" id="namesList"></div>
</div>

<div class="history-panel" id="historyPanel">
<h3>Saved Names <span style="font-size:.72rem;color:var(--muted);font-weight:400" id="histCount"></span></h3>
<div class="history-items" id="historyItems"></div>
</div>
</div>

<footer>Built with <a href="/">FreeMarketingStore</a> | <a href="https://openfrontier.pages.dev">Open Frontier</a></footer>

<script>
const PREFIXES=['get','try','use','go','my','the','hey','just','on','hi','be','re','un'];
const SUFFIXES=['ly','ify','hub','lab','io','app','hq','ful','co','ist','ware','zy','oo'];
const ALL_TLDS=['.com','.io','.co','.app','.dev','.online','.store','.ai','.tech','.xyz','.org','.net','.me','.so','.to','.gg','.cc','.biz','.pro','.agency','.studio','.design','.tools','.cloud','.digital','.global','.world','.one','.zone','.site','.space','.fun','.link'];
const DEFAULT_TLDS=['.com','.io','.co','.app','.dev','.ai'];
const CHECK_TIMEOUT=3000;
let names=[];
let chromeAi=false;

// --- Chrome AI detection ---
(async()=>{
  try{
    if(window.ai&&window.ai.languageModel){
      const c=await window.ai.languageModel.capabilities();
      if(c.available==='readily'||c.available==='after-download'){chromeAi=true;document.getElementById('aiDot').classList.add('on');document.getElementById('aiText').textContent='Chrome AI available — will enhance suggestions';}
      else{document.getElementById('aiText').textContent='Chrome AI: not available (algorithmic mode)';}
    }else{document.getElementById('aiText').textContent='Chrome AI: not available (algorithmic mode)';}
  }catch(e){document.getElementById('aiText').textContent='Chrome AI: not available (algorithmic mode)';}
})();

// --- Style chips ---
document.getElementById('styleChips').onclick=e=>{const c=e.target.closest('.chip');if(c)c.classList.toggle('active');};
function getStyles(){return[...document.querySelectorAll('#styleChips .chip.active')].map(c=>c.dataset.s);}

// --- Name generation ---
function generateNames(keywords,styles){
  const s=new Set();
  const kws=keywords.filter(k=>k).map(k=>k.toLowerCase().replace(/[^a-z0-9]/g,''));
  if(!kws.length)return[];
  // Combos
  for(let i=0;i<kws.length;i++)for(let j=0;j<kws.length;j++){if(i===j)continue;s.add(kws[i]+kws[j]);if(kws[i].length<=5&&kws[j].length<=5)s.add(kws[j]+kws[i]);}
  // Prefixes
  if(styles.includes('short')||styles.includes('brandable'))for(const k of kws)for(const p of PREFIXES)s.add(p+k);
  // Suffixes
  if(styles.includes('brandable')||styles.includes('creative'))for(const k of kws)for(const sf of SUFFIXES)s.add(k+sf);
  // Vowel removal
  if(styles.includes('short')||styles.includes('creative'))for(const k of kws){if(k.length>3){const nv=k[0]+k.slice(1).replace(/[aeiou]/g,'');if(nv.length>=3&&nv!==k)s.add(nv);}}
  // Blends
  if(styles.includes('creative')||styles.includes('brandable'))for(let i=0;i<kws.length;i++)for(let j=0;j<kws.length;j++){if(i===j)continue;const a=kws[i],b=kws[j];for(let o=1;o<=Math.min(3,a.length-1,b.length-1);o++){if(a.slice(-o)===b.slice(0,o))s.add(a+b.slice(o));}const h1=a.slice(0,Math.ceil(a.length/2)),h2=b.slice(Math.floor(b.length/2));if((h1+h2).length>=4)s.add(h1+h2);}
  // Descriptive
  if(styles.includes('descriptive')){const desc=['smart','fast','easy','super','mega','ultra','pro','prime','top','best','next','neo'];for(const k of kws)for(const d of desc)s.add(d+k);}
  // Short
  if(styles.includes('short'))for(const k of kws){if(k.length>4){s.add(k.slice(0,4));s.add(k.slice(0,5));}const l=k.slice(-1);if(!'aeiou'.includes(l)){s.add(k+l+'y');s.add(k+l+'o');}}
  return[...s].filter(n=>n.length>=3&&n.length<=14&&/^[a-z0-9]+$/.test(n)).sort((a,b)=>a.length-b.length||a.localeCompare(b)).slice(0,40);
}

// --- Chrome AI ---
async function aiSuggest(desc,keywords){
  if(!chromeAi)return[];
  try{const sess=await window.ai.languageModel.create();const r=await sess.prompt(`Generate 10 creative short brand names for: ${desc}. Keywords: ${keywords.join(', ')}. One per line, no explanation.`);sess.destroy();return r.split('\n').map(l=>l.trim().toLowerCase().replace(/[^a-z0-9]/g,'')).filter(n=>n.length>=3&&n.length<=14);}catch(e){return[];}
}

// --- Domain check ---
async function checkDomain(name,tld){
  const cached=getCache(name+tld);
  if(cached)return cached;
  let status;
  try{const ctrl=new AbortController();const t=setTimeout(()=>ctrl.abort(),CHECK_TIMEOUT);await fetch(`https://${name}${tld}/`,{method:'HEAD',mode:'no-cors',signal:ctrl.signal});clearTimeout(t);status='taken';}
  catch(e){status=e.name==='AbortError'?'uncertain':'available';}
  setCache(name+tld,status);
  return status;
}

// --- localStorage cache ---
function getCache(key){try{const d=JSON.parse(localStorage.getItem('fms-dc')||'{}');const r=d[key];if(r&&Date.now()-r.t<86400000)return r.s;}catch{}return null;}
function setCache(key,status){try{const d=JSON.parse(localStorage.getItem('fms-dc')||'{}');d[key]={s:status,t:Date.now()};const entries=Object.entries(d);if(entries.length>500){entries.sort((a,b)=>b[1].t-a[1].t);const trimmed=Object.fromEntries(entries.slice(0,500));localStorage.setItem('fms-dc',JSON.stringify(trimmed));}else localStorage.setItem('fms-dc',JSON.stringify(d));}catch{}}

// --- Saved names (full history with per-name state) ---
function getSaved(){try{return JSON.parse(localStorage.getItem('fms-dn-saved')||'[]');}catch{return[];}}
function setSaved(v){localStorage.setItem('fms-dn-saved',JSON.stringify(v));}
function saveName(name,tlds){
  const saved=getSaved();
  const existing=saved.find(n=>n.name===name);
  if(existing){existing.tlds={...existing.tlds,...tlds};existing.updated=Date.now();}
  else saved.unshift({name,tlds:tlds||{},created:Date.now(),updated:Date.now(),note:''});
  if(saved.length>100)saved.length=100;
  setSaved(saved);
  renderHistory();
}
function removeSaved(name){const saved=getSaved().filter(n=>n.name!==name);setSaved(saved);renderHistory();}
function updateNote(name,note){const saved=getSaved();const n=saved.find(s=>s.name===name);if(n){n.note=note;n.updated=Date.now();}setSaved(saved);}

// --- Render names ---
function renderNames(){
  const area=document.getElementById('namesArea');
  const list=document.getElementById('namesList');
  if(!names.length){area.style.display='none';return;}
  area.style.display='block';
  document.getElementById('namesCount').textContent=`${names.length} names generated`;

  list.innerHTML=names.map((name,i)=>`
    <div class="name-card" data-name="${name}" id="nc-${i}">
      <div class="name-header">
        <span class="name-text">${name}</span>
        <div class="name-actions">
          <button class="btn btn-secondary" onclick="checkName(${i})">Check</button>
          <button class="btn btn-secondary" onclick="saveName('${name}',getNameTlds(${i}))">Save</button>
        </div>
      </div>
      <div class="tld-row" id="tlds-${i}">
        ${DEFAULT_TLDS.map(tld=>`<a href="https://${name}${tld}" target="_blank" class="tld-badge unchecked" data-tld="${tld}" title="Click to visit">${tld}</a>`).join('')}
        <input class="add-tld-input" placeholder="+tld" data-idx="${i}" title="Type a TLD and press Enter">
      </div>
      <div class="name-meta" id="meta-${i}"></div>
    </div>
  `).join('');
}

function getNameTlds(idx){
  const container=document.getElementById('tlds-'+idx);
  if(!container)return{};
  const result={};
  container.querySelectorAll('.tld-badge').forEach(b=>{
    const cls=[...b.classList];
    if(cls.includes('available'))result[b.dataset.tld]='available';
    else if(cls.includes('taken'))result[b.dataset.tld]='taken';
    else if(cls.includes('uncertain'))result[b.dataset.tld]='uncertain';
  });
  return result;
}

async function checkName(idx){
  const name=names[idx];
  const container=document.getElementById('tlds-'+idx);
  const badges=container.querySelectorAll('.tld-badge');
  const meta=document.getElementById('meta-'+idx);
  meta.textContent='Checking...';
  let available=0,taken=0;
  for(const badge of badges){
    badge.className='tld-badge checking';
    badge.textContent=badge.dataset.tld+'...';
    const status=await checkDomain(name,badge.dataset.tld);
    badge.className='tld-badge '+status;
    badge.textContent=badge.dataset.tld;
    if(status==='available')available++;
    if(status==='taken')taken++;
  }
  meta.textContent=`${available} likely available, ${taken} taken`;
  // Auto-save with results
  saveName(name,getNameTlds(idx));
}

// --- Add TLD via input ---
document.addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;
  const input=e.target.closest('.add-tld-input');
  if(!input)return;
  let tld=input.value.trim().toLowerCase();
  if(!tld)return;
  if(!tld.startsWith('.'))tld='.'+tld;
  const idx=+input.dataset.idx;
  const container=document.getElementById('tlds-'+idx);
  // Check if already exists
  if(container.querySelector(`[data-tld="${tld}"]`)){input.value='';return;}
  const badge=document.createElement('a');
  badge.href=`https://${names[idx]}${tld}`;
  badge.target='_blank';
  badge.className='tld-badge unchecked';
  badge.dataset.tld=tld;
  badge.title='Click to visit';
  badge.textContent=tld;
  container.insertBefore(badge,input);
  input.value='';
});

// --- Check All (.com) ---
document.getElementById('checkAllBtn').onclick=async()=>{
  const btn=document.getElementById('checkAllBtn');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Checking...';
  for(let i=0;i<names.length;i++){
    const container=document.getElementById('tlds-'+i);
    const comBadge=container.querySelector('[data-tld=".com"]');
    if(comBadge&&comBadge.classList.contains('unchecked')){
      comBadge.className='tld-badge checking';comBadge.textContent='.com...';
      const status=await checkDomain(names[i],'.com');
      comBadge.className='tld-badge '+status;comBadge.textContent='.com';
    }
    btn.innerHTML=`<span class="spinner"></span>${i+1}/${names.length}`;
  }
  btn.disabled=false;btn.textContent='Check All (.com)';
};

// --- Export ---
document.getElementById('exportBtn').onclick=()=>{
  const avail=[];
  document.querySelectorAll('.name-card').forEach(card=>{
    const name=card.dataset.name;
    card.querySelectorAll('.tld-badge.available').forEach(b=>avail.push(name+b.dataset.tld));
  });
  if(!avail.length){const all=names.map(n=>n+'.com');navigator.clipboard.writeText(all.join('\n'));alert('Copied all names (none checked yet)');}
  else{navigator.clipboard.writeText(avail.join('\n'));alert(`Copied ${avail.length} available domains`);}
};

// --- History ---
function renderHistory(){
  const saved=getSaved();
  document.getElementById('histCount').textContent=saved.length?`(${saved.length} saved)`:'';
  const container=document.getElementById('historyItems');
  if(!saved.length){container.innerHTML='<div class="empty-state">Names you save will appear here. They persist across sessions.</div>';return;}
  container.innerHTML=saved.map((item,i)=>{
    const tldBadges=Object.entries(item.tlds||{}).map(([tld,status])=>`<span class="tld-badge ${status}">${tld}</span>`).join('');
    const time=new Date(item.updated||item.created).toLocaleDateString();
    return`<div class="history-item" data-hi="${i}">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span class="history-item-name">${item.name}</span>
        <div style="display:flex;gap:4px">
          <button class="btn btn-secondary" style="font-size:.65rem;padding:2px 8px" onclick="event.stopPropagation();recheckSaved(${i})">Re-check</button>
          <button class="btn btn-secondary" style="font-size:.65rem;padding:2px 8px" onclick="event.stopPropagation();removeSaved('${item.name}')">Remove</button>
        </div>
      </div>
      <div class="history-item-meta">${time}${item.note?' — '+item.note:''}</div>
      <div class="history-item-tlds">${tldBadges||'<span style="font-size:.65rem;color:#9ca3af">Not checked yet</span>'}</div>
    </div>`;
  }).join('');
}

async function recheckSaved(idx){
  const saved=getSaved();
  const item=saved[idx];
  if(!item)return;
  const tlds=Object.keys(item.tlds);
  if(!tlds.length){for(const tld of DEFAULT_TLDS)item.tlds[tld]='checking';}
  for(const tld of Object.keys(item.tlds)){
    item.tlds[tld]=await checkDomain(item.name,tld);
  }
  item.updated=Date.now();
  setSaved(saved);
  renderHistory();
}

// --- Generate ---
document.getElementById('genBtn').onclick=async()=>{
  const btn=document.getElementById('genBtn');
  const desc=document.getElementById('desc').value.trim();
  let kws=[document.getElementById('kw1').value.trim(),document.getElementById('kw2').value.trim(),document.getElementById('kw3').value.trim()].filter(Boolean);

  // Auto-extract from description
  if(!kws.length&&desc){
    const stops=new Set(['a','an','the','in','on','at','to','for','of','with','and','or','is','are','that','this','from','by','about','very','just','also','new','old','big','good','bad']);
    const words=desc.toLowerCase().replace(/[^a-z\s]/g,'').split(/\s+/).filter(w=>w.length>3&&!stops.has(w));
    kws=words.slice(0,3);
    if(kws[0])document.getElementById('kw1').value=kws[0];
    if(kws[1])document.getElementById('kw2').value=kws[1];
    if(kws[2])document.getElementById('kw3').value=kws[2];
  }
  if(!kws.length){document.getElementById('kw1').focus();return;}

  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Generating...';
  names=generateNames(kws,getStyles());
  renderNames();

  if(chromeAi&&desc){
    btn.innerHTML='<span class="spinner"></span>AI enhancing...';
    const ai=await aiSuggest(desc,kws);
    const set=new Set(names);
    for(const n of ai)if(!set.has(n)){names.push(n);set.add(n);}
    names=names.slice(0,50);
    renderNames();
  }

  btn.disabled=false;btn.textContent='Generate Names';
};

// --- Init ---
renderHistory();
</script>
<script src="/related.js"></script>
</body>
</html>
