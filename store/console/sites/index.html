<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audited Sites — FreeMarketingStore</title>
  <meta name="description" content="View locally registered website audit reports in FreeMarketingStore.">
  <link rel="canonical" href="https://freemarketingstore.pages.dev/console/sites/">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#f97316">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --accent: #f97316;
      --bg: #f7f8fb;
      --panel: #fff;
      --text: #1a1a1a;
      --muted: #64748b;
      --line: #e2e8f0;
      --ok: #12805c;
      --ok-bg: #e7f7ef;
      --warn: #9a5b00;
      --warn-bg: #fff2cc;
      --bad: #b42318;
      --bad-bg: #fee4df;
      --shadow: 0 8px 22px rgba(31, 41, 55, .08);
    }
    body { font-family: 'Manrope', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    button, input { font: inherit; }
    nav { display: flex; align-items: center; justify-content: space-between; max-width: 1200px; margin: 0 auto; padding: 1rem 1.5rem; background: var(--panel); border-bottom: 1px solid var(--line); }
    .brand { display: flex; align-items: center; gap: .5rem; color: var(--text); font-weight: 800; }
    .brand img { width: 24px; height: 24px; }
    .nav-links { display: flex; align-items: center; gap: .9rem; font-size: .84rem; font-weight: 700; }
    .nav-links a { color: var(--muted); }
    .shell { max-width: 1200px; margin: 0 auto; padding: 1.25rem 1.5rem 2.5rem; }
    .hero, .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; box-shadow: var(--shadow); min-width: 0; }
    .hero { padding: 1.25rem; margin-bottom: 1rem; display: grid; grid-template-columns: minmax(0, 1fr) 320px; gap: 1rem; align-items: end; }
    h1 { font-size: 2rem; line-height: 1.12; margin-bottom: .45rem; letter-spacing: 0; }
    .subtitle { color: var(--muted); line-height: 1.6; max-width: 720px; }
    .search label { display: block; color: var(--muted); font-size: .76rem; font-weight: 800; margin-bottom: .4rem; text-transform: uppercase; letter-spacing: .04em; }
    input { width: 100%; min-height: 42px; border: 1px solid var(--line); border-radius: 7px; padding: .7rem .85rem; background: #fff; }
    input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(249, 115, 22, .14); }
    .summary { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: .75rem; margin-bottom: 1rem; }
    .metric { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; box-shadow: var(--shadow); padding: .9rem; min-height: 82px; }
    .metric-label { color: var(--muted); font-size: .72rem; font-weight: 800; text-transform: uppercase; letter-spacing: .04em; }
    .metric-value { margin-top: .4rem; font-size: 1.35rem; font-weight: 800; }
    .panel h2 { padding: .9rem 1rem; border-bottom: 1px solid var(--line); font-size: 1rem; }
    .list { display: grid; gap: .65rem; padding: .75rem; }
    .site { display: grid; grid-template-columns: minmax(0, 1fr) 120px 170px; gap: .75rem; align-items: center; border: 1px solid var(--line); border-radius: 8px; padding: .85rem; background: #fff; }
    .domain { font-weight: 800; overflow-wrap: anywhere; }
    .meta { color: var(--muted); font-size: .78rem; margin-top: .2rem; overflow-wrap: anywhere; }
    .score { justify-self: start; display: inline-flex; align-items: center; justify-content: center; min-width: 68px; min-height: 34px; border-radius: 999px; font-weight: 800; }
    .ok { color: var(--ok); background: var(--ok-bg); }
    .warning { color: var(--warn); background: var(--warn-bg); }
    .critical { color: var(--bad); background: var(--bad-bg); }
    .actions { display: flex; justify-content: flex-end; gap: .4rem; flex-wrap: wrap; }
    .button { display: inline-flex; align-items: center; justify-content: center; min-height: 34px; border-radius: 7px; padding: .45rem .65rem; border: 1px solid var(--line); background: #fff; color: var(--text); font-weight: 800; font-size: .78rem; cursor: pointer; }
    .button.primary { border-color: var(--accent); background: var(--accent); color: #fff; }
    .button:hover { text-decoration: none; }
    .empty { padding: 2rem; text-align: center; color: var(--muted); }
    .hidden { display: none; }
    @media (max-width: 900px) {
      nav, .hero { align-items: flex-start; flex-direction: column; }
      nav { gap: .75rem; }
      .hero, .summary, .site { grid-template-columns: 1fr; }
      .actions { justify-content: flex-start; }
    }
    @media (max-width: 560px) {
      nav, .shell { padding-left: .9rem; padding-right: .9rem; }
      h1 { font-size: 1.55rem; }
      .nav-links { flex-wrap: wrap; }
      .button { width: 100%; }
    }
  </style>
  <script src="/pwa.js" defer></script>
</head>
<body>
  <nav>
    <a href="/" class="brand"><img src="/favicon.svg" alt="FMS"><span>FreeMarketingStore</span></a>
    <div class="nav-links">
      <a href="/console/">Console</a>
      <a href="/console/profile/">Profile</a>
      <a href="/console/search-console/">Search Console</a>
      <a href="/docs/">Docs</a>
      <a href="/seo/site-audit/">Website Audit</a>
      <a href="/">Store</a>
    </div>
  </nav>

  <main class="shell">
    <section class="hero">
      <div>
        <h1>Audited Sites</h1>
        <p class="subtitle" id="source-note">Local list of websites registered through the audit tool in this browser. Sign in from Profile to save sites and audit history server-side.</p>
      </div>
      <div class="search">
        <label for="search">Find a site</label>
        <input id="search" type="search" placeholder="Filter by domain">
      </div>
    </section>

    <section class="summary" id="summary"></section>

    <section class="panel">
      <h2>Sites</h2>
      <div class="list" id="sites"></div>
    </section>
  </main>

  <script>
    const storageKey = 'fms-site-audit-sites-v1';
    const sitesEl = document.getElementById('sites');
    const summaryEl = document.getElementById('summary');
    const searchEl = document.getElementById('search');
    const sourceNote = document.getElementById('source-note');
    let sites = sortSites(loadSites());
    let accountMode = false;

    function loadSites() {
      try {
        const parsed = JSON.parse(localStorage.getItem(storageKey) || '[]');
        return Array.isArray(parsed) ? parsed : [];
      } catch (_) {
        return [];
      }
    }

    function saveSites() {
      localStorage.setItem(storageKey, JSON.stringify(sites));
    }

    async function loadAccountSites() {
      try {
        const auth = await fetch('/api/auth/status').then(response => response.json());
        if (!auth.authenticated) return false;
        const data = await fetch('/api/sites').then(response => response.json());
        if (!Array.isArray(data.sites)) return false;
        sites = sortSites(data.sites);
        accountMode = true;
        sourceNote.textContent = 'Server-backed websites saved to your free FMS profile. Local browser reports can be imported from Profile.';
        return true;
      } catch (_) {
        return false;
      }
    }

    function siteTime(site) {
      return Date.parse(site.lastAudit?.checkedAt || site.createdAt || '') || 0;
    }

    function sortSites(items) {
      return [...items].sort((a, b) => siteTime(b) - siteTime(a));
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
      }[ch]));
    }

    function domainFor(url) {
      try { return new URL(url).hostname || url; }
      catch (_) { return url; }
    }

    function safeHttpUrl(url) {
      try {
        const parsed = new URL(url);
        return ['http:', 'https:'].includes(parsed.protocol) ? parsed.href : '';
      } catch (_) {
        return '';
      }
    }

    function scoreClass(score) {
      if (score == null) return 'warning';
      if (score >= 85) return 'ok';
      if (score >= 65) return 'warning';
      return 'critical';
    }

    function countsFor(site) {
      const issues = site.lastAudit?.issues || [];
      return issues.reduce((acc, issue) => {
        acc[issue.severity] = (acc[issue.severity] || 0) + 1;
        return acc;
      }, { critical: 0, warning: 0, info: 0 });
    }

    function checkedLabel(site) {
      return site.lastAudit?.checkedAt ? new Date(site.lastAudit.checkedAt).toLocaleString() : 'Not audited yet';
    }

    function renderSummary(filtered) {
      const audited = sites.filter(site => site.lastAudit);
      const average = audited.length ? Math.round(audited.reduce((sum, site) => sum + Number(site.lastAudit.score || 0), 0) / audited.length) : 0;
      summaryEl.innerHTML =
        '<article class="metric"><div class="metric-label">Registered</div><div class="metric-value">' + sites.length + '</div></article>' +
        '<article class="metric"><div class="metric-label">Audited</div><div class="metric-value">' + audited.length + '</div></article>' +
        '<article class="metric"><div class="metric-label">Average Score</div><div class="metric-value">' + (audited.length ? average : '-') + '</div></article>' +
        '<article class="metric"><div class="metric-label">Visible</div><div class="metric-value">' + filtered.length + '</div></article>';
    }

    function render() {
      const query = searchEl.value.trim().toLowerCase();
      const filtered = sortSites(sites).filter(site => domainFor(site.url).toLowerCase().includes(query) || String(site.url || '').toLowerCase().includes(query));
      renderSummary(filtered);
      if (!sites.length) {
        sitesEl.innerHTML = '<div class="empty">No sites yet. Run your first audit from the console.</div>';
        return;
      }
      if (!filtered.length) {
        sitesEl.innerHTML = '<div class="empty">No matching sites.</div>';
        return;
      }
      sitesEl.innerHTML = filtered.map(site => {
        const counts = countsFor(site);
        const score = site.lastAudit?.score;
        const issueText = score == null ? 'No report yet' : counts.critical + ' critical · ' + counts.warning + ' warnings · ' + counts.info + ' info';
        const openUrl = safeHttpUrl(site.url);
        return '<article class="site" data-id="' + escapeHtml(site.id) + '">' +
          '<div><div class="domain">' + escapeHtml(domainFor(site.url)) + '</div><div class="meta">' + escapeHtml(site.url) + '</div><div class="meta">' + escapeHtml(checkedLabel(site)) + ' · ' + escapeHtml(issueText) + '</div></div>' +
          '<div class="score ' + scoreClass(score) + '">' + escapeHtml(score ?? 'New') + '</div>' +
          '<div class="actions">' +
            '<a class="button primary" href="/seo/site-audit/?site=' + encodeURIComponent(site.id) + '">Report</a>' +
            '<a class="button" href="/seo/site-audit/?url=' + encodeURIComponent(site.url) + '">Re-audit</a>' +
            (openUrl ? '<a class="button" href="' + escapeHtml(openUrl) + '" target="_blank" rel="noopener">Open</a>' : '') +
            '<button class="button" type="button" data-action="delete" data-id="' + escapeHtml(site.id) + '">Delete</button>' +
          '</div>' +
        '</article>';
      }).join('');
    }

    searchEl.addEventListener('input', render);
    sitesEl.addEventListener('click', async event => {
      const button = event.target.closest('[data-action="delete"]');
      if (!button) return;
      if (accountMode) {
        await fetch('/api/sites/' + encodeURIComponent(button.dataset.id), { method: 'DELETE' });
      }
      sites = sites.filter(site => site.id !== button.dataset.id);
      if (!accountMode) saveSites();
      render();
    });

    loadAccountSites().then(render);
  </script>
</body>
</html>
