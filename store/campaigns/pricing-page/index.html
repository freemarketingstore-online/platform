<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pricing Page Generator - FreeMarketingStore</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Manrope',system-ui,sans-serif;background:#fafafa;color:#1a1a1a;min-height:100vh;padding:24px}
a{color:#f97316;text-decoration:none}
a:hover{text-decoration:underline}
.back{display:inline-block;margin-bottom:20px;font-size:14px;font-weight:500}
h1{font-size:28px;font-weight:800;margin-bottom:8px}
.subtitle{color:#6b7280;margin-bottom:24px;font-size:15px}
.container{max-width:1200px;margin:0 auto}
.panel{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:24px;margin-bottom:20px}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:#f97316;color:#fff}
.btn-primary:hover{background:#ea580c}
.btn-secondary{background:#fff;color:#1a1a1a;border:1px solid #e5e7eb}
.btn-secondary:hover{border-color:#f97316}
.btn-danger{background:#fee2e2;color:#dc2626;border:1px solid #fecaca}
.btn-danger:hover{background:#fecaca}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-group{display:flex;gap:8px;flex-wrap:wrap}
.tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:8px;border:1px solid #e5e7eb;background:#fff;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s}
.tab:hover{border-color:#f97316}
.tab.active{background:#f97316;color:#fff;border-color:#f97316}
.form-group{margin-bottom:14px}
label{font-size:13px;font-weight:600;display:block;margin-bottom:4px}
input,select,textarea{width:100%;padding:10px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px;font-family:inherit;background:#fafafa}
input:focus,select:focus,textarea:focus{outline:none;border-color:#f97316}
textarea{resize:vertical;min-height:60px}
.form-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
@media(max-width:640px){.form-row{grid-template-columns:1fr}}
.tier-editor{border:1px solid #e5e7eb;border-radius:10px;padding:16px;margin-bottom:12px;position:relative;background:#fff}
.tier-editor.popular{border-color:#f97316;box-shadow:0 0 0 1px #f97316}
.tier-badge{position:absolute;top:-10px;right:12px;background:#f97316;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px}
.tier-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.tier-header h4{font-size:14px;font-weight:700}
.remove-tier{background:none;border:none;color:#ef4444;cursor:pointer;font-size:18px}
.feature-list{list-style:none;padding:0;margin:8px 0}
.feature-list li{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:13px}
.feature-list li button{background:none;border:none;color:#ef4444;cursor:pointer;font-size:12px}
.add-feature-row{display:flex;gap:6px}
.add-feature-row input{flex:1;padding:6px 10px;border:1px solid #e5e7eb;border-radius:6px;font-size:12px;font-family:inherit}
.add-feature-row input:focus{outline:none;border-color:#f97316}
.add-feature-row button{padding:6px 10px;border:none;background:#f97316;color:#fff;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600}
.settings-row{display:flex;gap:16px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.settings-row label{margin:0;display:flex;align-items:center;gap:6px;cursor:pointer}
.settings-row input[type="checkbox"]{width:auto}
.layout-options{display:flex;gap:8px;margin-bottom:16px}
.layout-btn{padding:8px 16px;border-radius:8px;border:1px solid #e5e7eb;background:#fff;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s}
.layout-btn:hover{border-color:#f97316}
.layout-btn.active{background:#fff7ed;border-color:#f97316;color:#f97316}
/* Preview styles */
.preview-frame{border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;background:#fff;margin-top:20px}
.preview-header{background:#fafafa;border-bottom:1px solid #e5e7eb;padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
.preview-header span{font-size:13px;font-weight:600;color:#6b7280}
.toggle-billing{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600}
.toggle-billing .switch{width:40px;height:22px;border-radius:11px;background:#e5e7eb;cursor:pointer;position:relative;transition:all .2s}
.toggle-billing .switch.on{background:#f97316}
.toggle-billing .switch::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:all .2s}
.toggle-billing .switch.on::after{left:21px}
.preview-body{padding:40px 24px}
/* Cards layout */
.preview-cards{display:flex;justify-content:center;gap:20px;flex-wrap:wrap}
.p-card{border:1px solid #e5e7eb;border-radius:16px;padding:28px 24px;min-width:220px;flex:1;max-width:280px;text-align:center;transition:all .2s;position:relative}
.p-card.popular{border-color:#f97316;box-shadow:0 4px 20px rgba(249,115,22,.15);transform:scale(1.03)}
.p-card .pop-badge{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:#f97316;color:#fff;font-size:11px;font-weight:700;padding:3px 12px;border-radius:12px}
.p-card h3{font-size:18px;font-weight:800;margin-bottom:8px}
.p-card .price{font-size:36px;font-weight:800;color:#f97316;margin-bottom:4px}
.p-card .price span{font-size:14px;font-weight:500;color:#6b7280}
.p-card .billing-note{font-size:12px;color:#6b7280;margin-bottom:16px}
.p-card ul{list-style:none;padding:0;margin-bottom:20px;text-align:left}
.p-card li{font-size:13px;padding:5px 0;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;gap:6px}
.p-card li::before{content:">";color:#f97316;font-weight:700}
.p-card .cta-btn{display:block;padding:12px;border-radius:8px;font-size:14px;font-weight:700;text-decoration:none;transition:all .2s}
.p-card .cta-btn.primary{background:#f97316;color:#fff}
.p-card .cta-btn.secondary{background:#fff;color:#f97316;border:2px solid #f97316}
/* Table layout */
.preview-table{width:100%;border-collapse:collapse}
.preview-table th,.preview-table td{padding:10px 14px;border-bottom:1px solid #e5e7eb;text-align:center;font-size:13px}
.preview-table th{background:#fafafa;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.3px}
.preview-table td.feature-name{text-align:left;font-weight:500}
.preview-table .popular-col{background:#fff7ed}
/* Slider layout */
.preview-slider{text-align:center;max-width:400px;margin:0 auto}
.slider-input{width:100%;margin-bottom:20px}
.slider-card{border:2px solid #f97316;border-radius:16px;padding:32px;text-align:center}
.slider-card h3{font-size:22px;font-weight:800;margin-bottom:8px}
.slider-card .price{font-size:42px;font-weight:800;color:#f97316}
.slider-card .price span{font-size:14px;color:#6b7280;font-weight:500}
.slider-card ul{list-style:none;padding:0;margin:16px 0;text-align:left}
.slider-card li{font-size:13px;padding:5px 0}
.slider-card li::before{content:">";color:#f97316;font-weight:700;margin-right:6px}
</style>
</head>
<body>
<div class="container">
<a class="back" href="/">Back to Store</a>
<h1>Pricing Page Generator</h1>
<p class="subtitle">Build a professional pricing section and export it as ready-to-use HTML</p>

<div class="tabs">
  <button class="tab active" onclick="showTab('editor')">Editor</button>
  <button class="tab" onclick="showTab('preview')">Live Preview</button>
</div>

<div id="tab-editor">
  <div class="panel">
    <h3 style="font-size:15px;font-weight:700;margin-bottom:12px">Layout</h3>
    <div class="layout-options">
      <button class="layout-btn active" onclick="setLayout('cards')">Cards</button>
      <button class="layout-btn" onclick="setLayout('table')">Comparison Table</button>
      <button class="layout-btn" onclick="setLayout('slider')">Slider</button>
    </div>

    <div class="settings-row">
      <label><input type="checkbox" id="annual-toggle" checked onchange="renderPreview()"> Show monthly/annual toggle</label>
      <div class="form-group" style="margin:0">
        <label style="margin:0;font-size:12px">Annual discount %</label>
        <input type="number" id="annual-discount" value="20" min="0" max="50" style="width:70px;padding:6px 8px" onchange="renderPreview()">
      </div>
    </div>
  </div>

  <div class="panel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h3 style="font-size:15px;font-weight:700">Tiers</h3>
      <button class="btn btn-primary btn-sm" onclick="addTier()" id="add-tier-btn">+ Add Tier</button>
    </div>
    <div id="tiers-container"></div>
  </div>

  <div class="btn-group">
    <button class="btn btn-primary" onclick="showTab('preview')">Preview</button>
    <button class="btn btn-secondary" onclick="exportHTML()">Export HTML</button>
    <button class="btn btn-secondary" onclick="resetAll()">Reset</button>
  </div>
</div>

<div id="tab-preview" style="display:none">
  <div class="preview-frame">
    <div class="preview-header">
      <span>Preview</span>
      <button class="btn btn-secondary btn-sm" onclick="exportHTML()">Export HTML</button>
    </div>
    <div class="preview-body" id="preview-body"></div>
  </div>
</div>
</div>

<script>
let tiers = [
  { id: 1, name: 'Starter', price: 9, cycle: 'month', features: ['1 user', '5 projects', 'Basic analytics'], cta: 'Get Started', popular: false },
  { id: 2, name: 'Pro', price: 29, cycle: 'month', features: ['5 users', 'Unlimited projects', 'Advanced analytics', 'Priority support'], cta: 'Go Pro', popular: true },
  { id: 3, name: 'Enterprise', price: 99, cycle: 'month', features: ['Unlimited users', 'Custom integrations', 'Dedicated account manager', 'SLA guarantee', '24/7 support'], cta: 'Contact Sales', popular: false }
];
let layout = 'cards';
let showAnnual = false;

function loadData() {
  const saved = localStorage.getItem('fms-pricing');
  if (saved) {
    const parsed = JSON.parse(saved);
    tiers = parsed.tiers || tiers;
    layout = parsed.layout || layout;
  }
  renderEditor();
  renderPreview();
}

function saveData() {
  localStorage.setItem('fms-pricing', JSON.stringify({ tiers, layout }));
}

function setLayout(l) {
  layout = l;
  document.querySelectorAll('.layout-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase().includes(l.substring(0, 4))));
  saveData();
  renderPreview();
}

function showTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent.toLowerCase().includes(tab.substring(0, 4))));
  document.getElementById('tab-editor').style.display = tab === 'editor' ? 'block' : 'none';
  document.getElementById('tab-preview').style.display = tab === 'preview' ? 'block' : 'none';
  if (tab === 'preview') renderPreview();
}

function renderEditor() {
  const container = document.getElementById('tiers-container');
  const addBtn = document.getElementById('add-tier-btn');
  addBtn.style.display = tiers.length >= 4 ? 'none' : 'inline-flex';

  container.innerHTML = tiers.map((t, i) => `
    <div class="tier-editor ${t.popular ? 'popular' : ''}">
      ${t.popular ? '<div class="tier-badge">POPULAR</div>' : ''}
      <div class="tier-header">
        <h4>Tier ${i + 1}</h4>
        <div>
          <button class="btn btn-sm btn-secondary" onclick="togglePopular(${i})" style="margin-right:4px;font-size:11px">${t.popular ? 'Unmark' : 'Mark'} Popular</button>
          ${tiers.length > 2 ? `<button class="remove-tier" onclick="removeTier(${i})">x</button>` : ''}
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Tier Name</label>
          <input value="${esc(t.name)}" onchange="updateTier(${i},'name',this.value)">
        </div>
        <div class="form-group">
          <label>Monthly Price ($)</label>
          <input type="number" value="${t.price}" min="0" onchange="updateTier(${i},'price',parseFloat(this.value)||0)">
        </div>
        <div class="form-group">
          <label>CTA Button Text</label>
          <input value="${esc(t.cta)}" onchange="updateTier(${i},'cta',this.value)">
        </div>
      </div>
      <div class="form-group">
        <label>Features</label>
        <ul class="feature-list">${t.features.map((f, fi) => `<li>- ${esc(f)} <button onclick="removeFeature(${i},${fi})">x</button></li>`).join('')}</ul>
        <div class="add-feature-row">
          <input placeholder="Add feature" id="feat-${i}" onkeydown="if(event.key==='Enter')addFeature(${i})">
          <button onclick="addFeature(${i})">+</button>
        </div>
      </div>
    </div>
  `).join('');
}

function addTier() {
  if (tiers.length >= 4) return;
  tiers.push({ id: Date.now(), name: 'New Tier', price: 49, cycle: 'month', features: ['Feature 1'], cta: 'Get Started', popular: false });
  saveData(); renderEditor();
}

function removeTier(idx) {
  if (tiers.length <= 2) return;
  tiers.splice(idx, 1);
  saveData(); renderEditor();
}

function updateTier(idx, field, value) {
  tiers[idx][field] = value;
  saveData();
}

function togglePopular(idx) {
  tiers.forEach((t, i) => t.popular = (i === idx && !t.popular));
  saveData(); renderEditor();
}

function addFeature(idx) {
  const input = document.getElementById('feat-' + idx);
  const val = input.value.trim();
  if (!val) return;
  tiers[idx].features.push(val);
  input.value = '';
  saveData(); renderEditor();
}

function removeFeature(tierIdx, featIdx) {
  tiers[tierIdx].features.splice(featIdx, 1);
  saveData(); renderEditor();
}

function resetAll() {
  if (!confirm('Reset all tiers to defaults?')) return;
  tiers = [
    { id: 1, name: 'Starter', price: 9, cycle: 'month', features: ['1 user', '5 projects', 'Basic analytics'], cta: 'Get Started', popular: false },
    { id: 2, name: 'Pro', price: 29, cycle: 'month', features: ['5 users', 'Unlimited projects', 'Advanced analytics', 'Priority support'], cta: 'Go Pro', popular: true },
    { id: 3, name: 'Enterprise', price: 99, cycle: 'month', features: ['Unlimited users', 'Custom integrations', 'Dedicated account manager', 'SLA guarantee', '24/7 support'], cta: 'Contact Sales', popular: false }
  ];
  layout = 'cards';
  document.querySelectorAll('.layout-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === 'cards'));
  saveData(); renderEditor(); renderPreview();
}

function renderPreview() {
  const body = document.getElementById('preview-body');
  const showToggle = document.getElementById('annual-toggle').checked;
  const discount = parseInt(document.getElementById('annual-discount').value) || 20;

  let toggleHTML = '';
  if (showToggle) {
    toggleHTML = `<div style="text-align:center;margin-bottom:24px">
      <div class="toggle-billing">
        <span>Monthly</span>
        <div class="switch ${showAnnual ? 'on' : ''}" onclick="toggleAnnual()"></div>
        <span>Annual <small style="color:#10b981;font-weight:700">(save ${discount}%)</small></span>
      </div>
    </div>`;
  }

  if (layout === 'cards') {
    body.innerHTML = toggleHTML + `<div class="preview-cards">${tiers.map(t => {
      const price = showAnnual ? Math.round(t.price * (1 - discount / 100)) : t.price;
      return `<div class="p-card ${t.popular ? 'popular' : ''}">
        ${t.popular ? '<div class="pop-badge">Most Popular</div>' : ''}
        <h3>${esc(t.name)}</h3>
        <div class="price">$${price}<span>/${showAnnual ? 'mo (billed yearly)' : 'mo'}</span></div>
        <div class="billing-note">${showAnnual ? '$' + (price * 12) + '/year' : 'billed monthly'}</div>
        <ul>${t.features.map(f => '<li>' + esc(f) + '</li>').join('')}</ul>
        <a class="cta-btn ${t.popular ? 'primary' : 'secondary'}" href="#">${esc(t.cta)}</a>
      </div>`;
    }).join('')}</div>`;
  } else if (layout === 'table') {
    const allFeatures = [...new Set(tiers.flatMap(t => t.features))];
    body.innerHTML = toggleHTML + `<table class="preview-table"><thead><tr><th>Feature</th>${tiers.map(t => `<th class="${t.popular ? 'popular-col' : ''}">${esc(t.name)}<br><strong style="color:#f97316">$${showAnnual ? Math.round(t.price * (1 - discount / 100)) : t.price}/mo</strong></th>`).join('')}</tr></thead><tbody>${allFeatures.map(f => `<tr><td class="feature-name">${esc(f)}</td>${tiers.map(t => `<td class="${t.popular ? 'popular-col' : ''}">${t.features.includes(f) ? '<span style="color:#10b981;font-weight:700">Yes</span>' : '<span style="color:#d1d5db">-</span>'}</td>`).join('')}</tr>`).join('')}<tr><td></td>${tiers.map(t => `<td><a class="cta-btn ${t.popular ? 'primary' : 'secondary'}" href="#" style="display:inline-block;padding:8px 16px;border-radius:6px;font-size:12px;font-weight:700;text-decoration:none;${t.popular ? 'background:#f97316;color:#fff' : 'color:#f97316;border:1px solid #f97316'}">${esc(t.cta)}</a></td>`).join('')}</tr></tbody></table>`;
  } else if (layout === 'slider') {
    const discount = parseInt(document.getElementById('annual-discount').value) || 20;
    body.innerHTML = toggleHTML + `
      <div class="preview-slider">
        <input type="range" class="slider-input" min="0" max="${tiers.length - 1}" value="0" oninput="updateSlider(this.value)">
        <div id="slider-card"></div>
      </div>`;
    setTimeout(() => updateSlider(0), 0);
  }
}

function updateSlider(idx) {
  const t = tiers[idx];
  if (!t) return;
  const discount = parseInt(document.getElementById('annual-discount').value) || 20;
  const price = showAnnual ? Math.round(t.price * (1 - discount / 100)) : t.price;
  const card = document.getElementById('slider-card');
  if (!card) return;
  card.innerHTML = `<div class="slider-card">
    <h3>${esc(t.name)}</h3>
    <div class="price">$${price}<span>/${showAnnual ? 'mo (annual)' : 'mo'}</span></div>
    <ul>${t.features.map(f => '<li>' + esc(f) + '</li>').join('')}</ul>
    <a class="cta-btn primary" href="#" style="display:inline-block;padding:12px 24px;border-radius:8px;font-size:14px;font-weight:700;text-decoration:none;background:#f97316;color:#fff">${esc(t.cta)}</a>
  </div>`;
}

function toggleAnnual() {
  showAnnual = !showAnnual;
  renderPreview();
}

function exportHTML() {
  const discount = parseInt(document.getElementById('annual-discount').value) || 20;
  const showToggle = document.getElementById('annual-toggle').checked;

  let html = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pricing</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Manrope',system-ui,sans-serif;background:#fafafa;color:#1a1a1a;padding:60px 24px}
.pricing{max-width:1000px;margin:0 auto;text-align:center}
h1{font-size:32px;font-weight:800;margin-bottom:8px}
.sub{color:#6b7280;margin-bottom:32px}
.toggle{display:inline-flex;align-items:center;gap:8px;margin-bottom:32px;font-size:14px;font-weight:600}
.toggle .sw{width:40px;height:22px;border-radius:11px;background:#e5e7eb;cursor:pointer;position:relative}
.toggle .sw.on{background:#f97316}
.toggle .sw::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:.2s}
.toggle .sw.on::after{left:21px}
.cards{display:flex;justify-content:center;gap:20px;flex-wrap:wrap}
.card{border:1px solid #e5e7eb;border-radius:16px;padding:28px 24px;flex:1;min-width:220px;max-width:280px;position:relative}
.card.pop{border-color:#f97316;box-shadow:0 4px 20px rgba(249,115,22,.15);transform:scale(1.03)}
.card .badge{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:#f97316;color:#fff;font-size:11px;font-weight:700;padding:3px 12px;border-radius:12px}
.card h3{font-size:18px;font-weight:800;margin-bottom:8px}
.card .price{font-size:36px;font-weight:800;color:#f97316}
.card .price span{font-size:14px;color:#6b7280;font-weight:500}
.card .note{font-size:12px;color:#6b7280;margin-bottom:16px}
.card ul{list-style:none;padding:0;margin-bottom:20px;text-align:left}
.card li{font-size:13px;padding:5px 0;border-bottom:1px solid #f3f4f6}
.card li::before{content:">";color:#f97316;font-weight:700;margin-right:6px}
.card .cta{display:block;padding:12px;border-radius:8px;font-size:14px;font-weight:700;text-decoration:none;text-align:center}
.card .cta.primary{background:#f97316;color:#fff}
.card .cta.outline{color:#f97316;border:2px solid #f97316}
</style>
</head>
<body>
<div class="pricing">
<h1>Simple, transparent pricing</h1>
<p class="sub">Choose the plan that works for you</p>
`;

  if (showToggle) {
    html += `<div class="toggle"><span>Monthly</span><div class="sw" id="sw" onclick="this.classList.toggle('on');update()"></div><span>Annual (save ${discount}%)</span></div>\n`;
  }

  html += `<div class="cards">\n`;
  tiers.forEach(t => {
    html += `  <div class="card ${t.popular ? 'pop' : ''}">\n`;
    if (t.popular) html += `    <div class="badge">Most Popular</div>\n`;
    html += `    <h3>${esc(t.name)}</h3>\n`;
    html += `    <div class="price" data-monthly="${t.price}" data-annual="${Math.round(t.price * (1 - discount / 100))}">$${t.price}<span>/mo</span></div>\n`;
    html += `    <div class="note">billed monthly</div>\n`;
    html += `    <ul>${t.features.map(f => '\n      <li>' + esc(f) + '</li>').join('')}\n    </ul>\n`;
    html += `    <a class="cta ${t.popular ? 'primary' : 'outline'}" href="#">${esc(t.cta)}</a>\n`;
    html += `  </div>\n`;
  });
  html += `</div>\n</div>\n`;

  if (showToggle) {
    html += `<script>
function update(){const on=document.getElementById('sw').classList.contains('on');document.querySelectorAll('.price').forEach(p=>{const v=on?p.dataset.annual:p.dataset.monthly;p.innerHTML='$'+v+'<span>/'+(on?'mo (annual)':'mo')+'</span>';});document.querySelectorAll('.note').forEach(n=>{n.textContent=on?'billed annually':'billed monthly';});}
<\/script>\n`;
  }

  html += `</body>\n</html>`;

  const blob = new Blob([html], { type: 'text/html' });
  const link = document.createElement('a');
  link.download = 'pricing-page.html';
  link.href = URL.createObjectURL(blob);
  link.click();
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

loadData();
</script>
<script src="/related.js"></script>
</body>
</html>
