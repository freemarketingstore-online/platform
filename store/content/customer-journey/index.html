<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Journey Mapper - FreeMarketingStore</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#f97316">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Manrope',system-ui,sans-serif;background:#fafafa;color:#1a1a1a;min-height:100vh;padding:24px}
a{color:#f97316;text-decoration:none}
a:hover{text-decoration:underline}
.back{display:inline-block;margin-bottom:20px;font-size:14px;font-weight:500}
h1{font-size:28px;font-weight:800;margin-bottom:8px}
.subtitle{color:#6b7280;margin-bottom:24px;font-size:15px}
.container{max-width:1200px;margin:0 auto}
.panel{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:24px;margin-bottom:20px}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:#f97316;color:#fff}
.btn-primary:hover{background:#ea580c}
.btn-secondary{background:#fff;color:#1a1a1a;border:1px solid #e5e7eb}
.btn-secondary:hover{border-color:#f97316}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-group{display:flex;gap:8px;flex-wrap:wrap}
.journey-line{display:flex;align-items:stretch;gap:0;margin:30px 0;overflow-x:auto;padding-bottom:16px}
.stage{flex:1;min-width:200px;position:relative;display:flex;flex-direction:column}
.stage-header{text-align:center;padding:16px 12px;border-radius:12px 12px 0 0;color:#fff;font-weight:700;font-size:14px;position:relative}
.stage:nth-child(1) .stage-header{background:#f97316}
.stage:nth-child(2) .stage-header{background:#f59e0b}
.stage:nth-child(3) .stage-header{background:#10b981}
.stage:nth-child(4) .stage-header{background:#3b82f6}
.stage:nth-child(5) .stage-header{background:#8b5cf6}
.stage-connector{position:absolute;right:-12px;top:50%;transform:translateY(-50%);width:24px;height:24px;background:#fff;border:2px solid #e5e7eb;border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:2;font-size:12px;color:#6b7280}
.stage:last-child .stage-connector{display:none}
.stage-body{background:#fff;border:1px solid #e5e7eb;border-top:none;border-radius:0 0 12px 12px;padding:16px;flex:1;display:flex;flex-direction:column;gap:12px}
.emotion-row{display:flex;align-items:center;justify-content:center;gap:8px}
.emotion-btn{width:36px;height:36px;border-radius:50%;border:2px solid #e5e7eb;background:#fff;font-size:18px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
.emotion-btn.active{border-color:#f97316;background:#fff7ed;transform:scale(1.15)}
.section-label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#6b7280;font-weight:700;margin-bottom:4px}
.item-list{list-style:none;padding:0;display:flex;flex-direction:column;gap:4px}
.item-list li{font-size:13px;padding:6px 10px;background:#fafafa;border-radius:6px;display:flex;justify-content:space-between;align-items:center;word-break:break-word}
.item-list li button{background:none;border:none;color:#ef4444;cursor:pointer;font-size:14px;flex-shrink:0;margin-left:6px}
.add-row{display:flex;gap:6px;margin-top:4px}
.add-row input{flex:1;padding:6px 10px;border:1px solid #e5e7eb;border-radius:6px;font-size:12px;font-family:inherit}
.add-row input:focus{outline:none;border-color:#f97316}
.add-row button{padding:6px 10px;border:none;background:#f97316;color:#fff;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600;white-space:nowrap}
.emotion-visual{display:flex;align-items:center;justify-content:center;padding:12px 0}
.journey-path{display:flex;align-items:center;margin:0 0 24px}
.journey-path-segment{flex:1;height:4px;position:relative}
.stage:nth-child(1) ~ .journey-path-segment{background:#f97316}
.journey-dot{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;border:3px solid;background:#fff}
.export-bar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.project-input{display:flex;gap:8px;align-items:center;margin-bottom:20px}
.project-input input{padding:10px 14px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px;font-family:inherit;width:300px}
.project-input input:focus{outline:none;border-color:#f97316}
.saved-journeys{margin-top:20px}
.saved-journeys h3{font-size:15px;font-weight:700;margin-bottom:8px}
.journey-list{display:flex;flex-direction:column;gap:6px}
.journey-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#fff;border:1px solid #e5e7eb;border-radius:8px;font-size:13px}
.journey-item button{background:none;border:none;cursor:pointer;font-size:12px;font-weight:600}
.journey-item .load-btn{color:#f97316}
.journey-item .del-btn{color:#ef4444}
.pain-opp{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.pain-opp-section{background:#fafafa;border-radius:8px;padding:8px}
.pain-opp-section h5{font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-weight:700}
.pain-opp-section.pain h5{color:#ef4444}
.pain-opp-section.opp h5{color:#10b981}
#export-canvas{position:absolute;left:-9999px}
</style>
  <script src="/pwa.js" defer></script>
</head>
<body>
<div class="container">
<a class="back" href="/">Back to Store</a>
<h1>Customer Journey Mapper</h1>
<p class="subtitle">Map your customer's experience from first touch to loyal advocate</p>

<div class="project-input">
  <input type="text" id="journey-name" placeholder="Journey name (e.g. SaaS Free Trial)" value="My Customer Journey">
  <button class="btn btn-primary btn-sm" onclick="saveJourney()">Save</button>
</div>

<div class="export-bar">
  <div class="btn-group">
    <button class="btn btn-secondary btn-sm" onclick="exportPNG()">Export PNG</button>
    <button class="btn btn-secondary btn-sm" onclick="exportHTML()">Export HTML</button>
    <button class="btn btn-secondary btn-sm" onclick="resetJourney()">Reset</button>
  </div>
</div>

<div class="journey-line" id="journey-line"></div>

<div class="panel saved-journeys" id="saved-section" style="display:none">
  <h3>Saved Journeys</h3>
  <div class="journey-list" id="journey-list"></div>
</div>
</div>

<canvas id="export-canvas"></canvas>

<script>
const STAGES = ['Awareness','Consideration','Decision','Retention','Advocacy'];
const STAGE_COLORS = ['#f97316','#f59e0b','#10b981','#3b82f6','#8b5cf6'];
const EMOTIONS = [{emoji:'😊',label:'happy'},{emoji:'😐',label:'neutral'},{emoji:'😤',label:'frustrated'}];

let data = STAGES.map(s => ({
  stage: s,
  emotion: 'neutral',
  touchpoints: [],
  channels: [],
  actions: [],
  painPoints: [],
  opportunities: []
}));

function render() {
  const container = document.getElementById('journey-line');
  container.innerHTML = data.map((d, i) => `
    <div class="stage">
      <div class="stage-header">
        ${d.stage}
        ${i < STAGES.length - 1 ? '<div class="stage-connector">&#8594;</div>' : ''}
      </div>
      <div class="stage-body">
        <div class="emotion-row">
          ${EMOTIONS.map(e => `
            <button class="emotion-btn ${d.emotion === e.label ? 'active' : ''}"
                    onclick="setEmotion(${i},'${e.label}')">${e.emoji}</button>
          `).join('')}
        </div>

        <div>
          <div class="section-label">Touchpoints</div>
          <ul class="item-list">${d.touchpoints.map((t, ti) => `<li>${esc(t)}<button onclick="removeItem(${i},'touchpoints',${ti})">x</button></li>`).join('')}</ul>
          <div class="add-row">
            <input placeholder="Add touchpoint" id="tp-${i}" onkeydown="if(event.key==='Enter'){addItem(${i},'touchpoints','tp-${i}')}">
            <button onclick="addItem(${i},'touchpoints','tp-${i}')">+</button>
          </div>
        </div>

        <div>
          <div class="section-label">Channels</div>
          <ul class="item-list">${d.channels.map((c, ci) => `<li>${esc(c)}<button onclick="removeItem(${i},'channels',${ci})">x</button></li>`).join('')}</ul>
          <div class="add-row">
            <input placeholder="Add channel" id="ch-${i}" onkeydown="if(event.key==='Enter'){addItem(${i},'channels','ch-${i}')}">
            <button onclick="addItem(${i},'channels','ch-${i}')">+</button>
          </div>
        </div>

        <div>
          <div class="section-label">Actions</div>
          <ul class="item-list">${d.actions.map((a, ai) => `<li>${esc(a)}<button onclick="removeItem(${i},'actions',${ai})">x</button></li>`).join('')}</ul>
          <div class="add-row">
            <input placeholder="Add action" id="ac-${i}" onkeydown="if(event.key==='Enter'){addItem(${i},'actions','ac-${i}')}">
            <button onclick="addItem(${i},'actions','ac-${i}')">+</button>
          </div>
        </div>

        <div class="pain-opp">
          <div class="pain-opp-section pain">
            <h5>Pain Points</h5>
            <ul class="item-list">${d.painPoints.map((p, pi) => `<li>${esc(p)}<button onclick="removeItem(${i},'painPoints',${pi})">x</button></li>`).join('')}</ul>
            <div class="add-row">
              <input placeholder="Pain" id="pp-${i}" onkeydown="if(event.key==='Enter'){addItem(${i},'painPoints','pp-${i}')}">
              <button onclick="addItem(${i},'painPoints','pp-${i}')">+</button>
            </div>
          </div>
          <div class="pain-opp-section opp">
            <h5>Opportunities</h5>
            <ul class="item-list">${d.opportunities.map((o, oi) => `<li>${esc(o)}<button onclick="removeItem(${i},'opportunities',${oi})">x</button></li>`).join('')}</ul>
            <div class="add-row">
              <input placeholder="Opportunity" id="op-${i}" onkeydown="if(event.key==='Enter'){addItem(${i},'opportunities','op-${i}')}">
              <button onclick="addItem(${i},'opportunities','op-${i}')">+</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

function setEmotion(stageIdx, emotion) {
  data[stageIdx].emotion = emotion;
  render();
}

function addItem(stageIdx, field, inputId) {
  const input = document.getElementById(inputId);
  const val = input.value.trim();
  if (!val) return;
  data[stageIdx][field].push(val);
  input.value = '';
  render();
}

function removeItem(stageIdx, field, itemIdx) {
  data[stageIdx][field].splice(itemIdx, 1);
  render();
}

function resetJourney() {
  if (!confirm('Reset the current journey?')) return;
  data = STAGES.map(s => ({ stage: s, emotion: 'neutral', touchpoints: [], channels: [], actions: [], painPoints: [], opportunities: [] }));
  document.getElementById('journey-name').value = 'My Customer Journey';
  render();
}

function saveJourney() {
  const name = document.getElementById('journey-name').value.trim() || 'Untitled';
  const journeys = JSON.parse(localStorage.getItem('fms-journeys') || '[]');
  journeys.push({ id: Date.now(), name, data: JSON.parse(JSON.stringify(data)), savedAt: new Date().toISOString() });
  localStorage.setItem('fms-journeys', JSON.stringify(journeys));
  renderSaved();
}

function loadJourney(id) {
  const journeys = JSON.parse(localStorage.getItem('fms-journeys') || '[]');
  const j = journeys.find(x => x.id === id);
  if (!j) return;
  data = j.data;
  document.getElementById('journey-name').value = j.name;
  render();
}

function deleteJourney(id) {
  let journeys = JSON.parse(localStorage.getItem('fms-journeys') || '[]');
  journeys = journeys.filter(x => x.id !== id);
  localStorage.setItem('fms-journeys', JSON.stringify(journeys));
  renderSaved();
}

function renderSaved() {
  const journeys = JSON.parse(localStorage.getItem('fms-journeys') || '[]');
  const section = document.getElementById('saved-section');
  const list = document.getElementById('journey-list');
  if (!journeys.length) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  list.innerHTML = journeys.map(j => `
    <div class="journey-item">
      <span>${esc(j.name)} <small style="color:#6b7280">(${new Date(j.savedAt).toLocaleDateString()})</small></span>
      <span>
        <button class="load-btn" onclick="loadJourney(${j.id})">Load</button>
        <button class="del-btn" onclick="deleteJourney(${j.id})">Delete</button>
      </span>
    </div>
  `).join('');
}

function exportPNG() {
  const canvas = document.getElementById('export-canvas');
  const ctx = canvas.getContext('2d');
  const w = 1200, h = 700;
  canvas.width = w; canvas.height = h;
  ctx.fillStyle = '#fafafa'; ctx.fillRect(0, 0, w, h);

  const name = document.getElementById('journey-name').value || 'Customer Journey';
  ctx.fillStyle = '#1a1a1a'; ctx.font = 'bold 24px Manrope,sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(name, w / 2, 40);

  const stageW = 200, gap = 20, startX = (w - (stageW * 5 + gap * 4)) / 2;
  const emotionEmoji = { happy: '😊', neutral: '😐', frustrated: '😤' };

  data.forEach((d, i) => {
    const x = startX + i * (stageW + gap);
    ctx.fillStyle = STAGE_COLORS[i]; ctx.beginPath();
    ctx.roundRect(x, 60, stageW, 36, 8); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 13px Manrope,sans-serif';
    ctx.fillText(d.stage, x + stageW / 2, 83);

    ctx.font = '28px sans-serif';
    ctx.fillText(emotionEmoji[d.emotion] || '😐', x + stageW / 2, 125);

    ctx.textAlign = 'left'; let y = 150;
    ctx.fillStyle = STAGE_COLORS[i]; ctx.font = 'bold 10px Manrope,sans-serif';
    ctx.fillText('TOUCHPOINTS', x + 8, y); y += 14;
    ctx.fillStyle = '#4b5563'; ctx.font = '11px Manrope,sans-serif';
    d.touchpoints.slice(0, 4).forEach(t => { ctx.fillText('- ' + t.substring(0, 24), x + 8, y); y += 14; });
    y += 8;

    ctx.fillStyle = STAGE_COLORS[i]; ctx.font = 'bold 10px Manrope,sans-serif';
    ctx.fillText('CHANNELS', x + 8, y); y += 14;
    ctx.fillStyle = '#4b5563'; ctx.font = '11px Manrope,sans-serif';
    d.channels.slice(0, 3).forEach(c => { ctx.fillText('- ' + c.substring(0, 24), x + 8, y); y += 14; });
    y += 8;

    ctx.fillStyle = STAGE_COLORS[i]; ctx.font = 'bold 10px Manrope,sans-serif';
    ctx.fillText('ACTIONS', x + 8, y); y += 14;
    ctx.fillStyle = '#4b5563'; ctx.font = '11px Manrope,sans-serif';
    d.actions.slice(0, 3).forEach(a => { ctx.fillText('- ' + a.substring(0, 24), x + 8, y); y += 14; });
    y += 8;

    if (d.painPoints.length) {
      ctx.fillStyle = '#ef4444'; ctx.font = 'bold 10px Manrope,sans-serif';
      ctx.fillText('PAIN POINTS', x + 8, y); y += 14;
      ctx.fillStyle = '#4b5563'; ctx.font = '11px Manrope,sans-serif';
      d.painPoints.slice(0, 2).forEach(p => { ctx.fillText('- ' + p.substring(0, 24), x + 8, y); y += 14; });
      y += 8;
    }
    if (d.opportunities.length) {
      ctx.fillStyle = '#10b981'; ctx.font = 'bold 10px Manrope,sans-serif';
      ctx.fillText('OPPORTUNITIES', x + 8, y); y += 14;
      ctx.fillStyle = '#4b5563'; ctx.font = '11px Manrope,sans-serif';
      d.opportunities.slice(0, 2).forEach(o => { ctx.fillText('- ' + o.substring(0, 24), x + 8, y); y += 14; });
    }
    ctx.textAlign = 'center';
  });

  const link = document.createElement('a');
  link.download = name.replace(/\s+/g, '-').toLowerCase() + '-journey.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function exportHTML() {
  const name = document.getElementById('journey-name').value || 'Customer Journey';
  const emotionEmoji = { happy: '😊', neutral: '😐', frustrated: '😤' };
  let html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${esc(name)}</title><style>body{font-family:Manrope,sans-serif;background:#fafafa;padding:40px}h1{text-align:center;margin-bottom:30px}.journey{display:flex;gap:16px;overflow-x:auto}.stage{flex:1;min-width:180px}.stage-h{padding:14px;border-radius:8px;color:#fff;text-align:center;font-weight:700;font-size:14px}.stage-b{background:#fff;border:1px solid #e5e7eb;border-radius:0 0 8px 8px;padding:14px;font-size:13px}.emoji{text-align:center;font-size:24px;margin:8px 0}h4{font-size:11px;text-transform:uppercase;color:#6b7280;margin:10px 0 4px}ul{list-style:none;padding:0}li{padding:2px 0}</style>
</head><body><h1>${esc(name)}</h1><div class="journey">`;
  data.forEach((d, i) => {
    html += `<div class="stage"><div class="stage-h" style="background:${STAGE_COLORS[i]}">${d.stage}</div><div class="stage-b"><div class="emoji">${emotionEmoji[d.emotion]}</div>`;
    if (d.touchpoints.length) html += `<h4>Touchpoints</h4><ul>${d.touchpoints.map(t => '<li>' + esc(t) + '</li>').join('')}</ul>`;
    if (d.channels.length) html += `<h4>Channels</h4><ul>${d.channels.map(c => '<li>' + esc(c) + '</li>').join('')}</ul>`;
    if (d.actions.length) html += `<h4>Actions</h4><ul>${d.actions.map(a => '<li>' + esc(a) + '</li>').join('')}</ul>`;
    if (d.painPoints.length) html += `<h4 style="color:#ef4444">Pain Points</h4><ul>${d.painPoints.map(p => '<li>' + esc(p) + '</li>').join('')}</ul>`;
    if (d.opportunities.length) html += `<h4 style="color:#10b981">Opportunities</h4><ul>${d.opportunities.map(o => '<li>' + esc(o) + '</li>').join('')}</ul>`;
    html += `</div></div>`;
  });
  html += `</div></body></html>`;
  const blob = new Blob([html], { type: 'text/html' });
  const link = document.createElement('a');
  link.download = name.replace(/\s+/g, '-').toLowerCase() + '-journey.html';
  link.href = URL.createObjectURL(blob);
  link.click();
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

render();
renderSaved();
</script>
<script src="/related.js"></script>
</body>
</html>
