<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Persona Builder - FreeMarketingStore</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#f97316">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Manrope',system-ui,sans-serif;background:#fafafa;color:#1a1a1a;min-height:100vh;padding:24px}
a{color:#f97316;text-decoration:none}
a:hover{text-decoration:underline}
.back{display:inline-block;margin-bottom:20px;font-size:14px;font-weight:500}
h1{font-size:28px;font-weight:800;margin-bottom:8px}
.subtitle{color:#6b7280;margin-bottom:24px;font-size:15px}
.container{max-width:1200px;margin:0 auto}
.tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:8px;border:1px solid #e5e7eb;background:#fff;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s}
.tab:hover{border-color:#f97316}
.tab.active{background:#f97316;color:#fff;border-color:#f97316}
.panel{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:24px;margin-bottom:20px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:768px){.form-grid{grid-template-columns:1fr}}
label{font-size:13px;font-weight:600;display:block;margin-bottom:4px}
input,select,textarea{width:100%;padding:10px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px;font-family:inherit;background:#fafafa}
input:focus,select:focus,textarea:focus{outline:none;border-color:#f97316}
textarea{resize:vertical;min-height:80px}
.form-group{margin-bottom:16px}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:#f97316;color:#fff}
.btn-primary:hover{background:#ea580c}
.btn-secondary{background:#fff;color:#1a1a1a;border:1px solid #e5e7eb}
.btn-secondary:hover{border-color:#f97316}
.btn-group{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.persona-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:20px;margin-top:20px}
.persona-card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;overflow:hidden;position:relative}
.persona-header{background:linear-gradient(135deg,#f97316,#fb923c);padding:24px;color:#fff;text-align:center}
.persona-avatar{width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:32px;border:3px solid rgba(255,255,255,.4)}
.persona-name{font-size:20px;font-weight:800}
.persona-role{font-size:13px;opacity:.9;margin-top:4px}
.persona-body{padding:20px}
.persona-section{margin-bottom:16px}
.persona-section h4{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:#f97316;margin-bottom:6px;font-weight:700}
.persona-section p,.persona-section li{font-size:13px;color:#4b5563;line-height:1.5}
.persona-section ul{list-style:none;padding:0}
.persona-section li::before{content:">";margin-right:6px;color:#f97316;font-weight:700}
.persona-quote{font-style:italic;background:#fafafa;padding:12px;border-radius:8px;border-left:3px solid #f97316;font-size:13px;color:#4b5563}
.persona-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.stat{background:#fafafa;padding:8px 12px;border-radius:6px;text-align:center}
.stat-label{font-size:11px;color:#6b7280;text-transform:uppercase}
.stat-value{font-size:15px;font-weight:700;color:#f97316}
.template-selector{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.template-btn{padding:6px 14px;border-radius:20px;border:1px solid #e5e7eb;background:#fff;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s}
.template-btn:hover,.template-btn.active{background:#fff7ed;border-color:#f97316;color:#f97316}
.compare-view{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px}
.empty-state{text-align:center;padding:60px 20px;color:#6b7280}
.empty-state svg{width:64px;height:64px;margin-bottom:16px;opacity:.4}
.actions-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.persona-delete{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.2);border:none;color:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.persona-delete:hover{background:rgba(0,0,0,.4)}
#canvas-export{position:absolute;left:-9999px}
</style>
  <script src="/pwa.js" defer></script>
</head>
<body>
<div class="container">
<a class="back" href="/">Back to Store</a>
<h1>Customer Persona Builder</h1>
<p class="subtitle">Create detailed customer personas to guide your marketing strategy</p>

<div class="tabs">
  <button class="tab active" onclick="showView('builder')">Build Persona</button>
  <button class="tab" onclick="showView('gallery')">My Personas</button>
  <button class="tab" onclick="showView('compare')">Compare</button>
</div>

<div id="view-builder">
  <div class="panel">
    <h3 style="margin-bottom:16px;font-size:16px;font-weight:700">Choose a Template</h3>
    <div class="template-selector">
      <button class="template-btn active" onclick="loadTemplate('b2b')">B2B Buyer</button>
      <button class="template-btn" onclick="loadTemplate('consumer')">Consumer</button>
      <button class="template-btn" onclick="loadTemplate('developer')">Developer</button>
      <button class="template-btn" onclick="loadTemplate('enterprise')">Enterprise</button>
      <button class="template-btn" onclick="loadTemplate('blank')">Blank</button>
    </div>

    <form id="persona-form" onsubmit="return createPersona(event)">
      <div class="form-grid">
        <div class="form-group">
          <label>Persona Name</label>
          <input type="text" id="pName" placeholder="e.g. Marketing Mary" required>
        </div>
        <div class="form-group">
          <label>Role / Title</label>
          <input type="text" id="pRole" placeholder="e.g. VP of Marketing at SaaS company">
        </div>
        <div class="form-group">
          <label>Age Range</label>
          <select id="pAge">
            <option value="18-24">18-24</option>
            <option value="25-34" selected>25-34</option>
            <option value="35-44">35-44</option>
            <option value="45-54">45-54</option>
            <option value="55-64">55-64</option>
            <option value="65+">65+</option>
          </select>
        </div>
        <div class="form-group">
          <label>Income Level</label>
          <select id="pIncome">
            <option value="< $30k">&lt; $30k</option>
            <option value="$30k-$60k">$30k-$60k</option>
            <option value="$60k-$100k" selected>$60k-$100k</option>
            <option value="$100k-$150k">$100k-$150k</option>
            <option value="$150k+">$150k+</option>
          </select>
        </div>
        <div class="form-group">
          <label>Location</label>
          <input type="text" id="pLocation" placeholder="e.g. Urban, USA">
        </div>
        <div class="form-group">
          <label>Education</label>
          <select id="pEducation">
            <option value="High School">High School</option>
            <option value="Bachelor's" selected>Bachelor's</option>
            <option value="Master's">Master's</option>
            <option value="PhD">PhD</option>
            <option value="Self-taught">Self-taught</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Goals (one per line)</label>
        <textarea id="pGoals" placeholder="Increase team productivity&#10;Reduce marketing spend&#10;Prove ROI to leadership"></textarea>
      </div>
      <div class="form-group">
        <label>Frustrations / Pain Points (one per line)</label>
        <textarea id="pFrustrations" placeholder="Too many tools that don't integrate&#10;Can't measure campaign impact&#10;Limited budget"></textarea>
      </div>
      <div class="form-group">
        <label>Preferred Channels (one per line)</label>
        <textarea id="pChannels" placeholder="LinkedIn&#10;Industry blogs&#10;Podcasts&#10;Email newsletters"></textarea>
      </div>
      <div class="form-group">
        <label>Quote (what would they say?)</label>
        <input type="text" id="pQuote" placeholder="&quot;I need tools that just work without a learning curve.&quot;">
      </div>
      <div class="form-group">
        <label>Tech Savviness (1-10)</label>
        <input type="range" id="pTech" min="1" max="10" value="6" oninput="this.nextElementSibling.textContent=this.value">
        <span style="font-size:13px;color:#6b7280">6</span>
      </div>
      <div class="form-group">
        <label>Budget Authority (1-10)</label>
        <input type="range" id="pBudget" min="1" max="10" value="5" oninput="this.nextElementSibling.textContent=this.value">
        <span style="font-size:13px;color:#6b7280">5</span>
      </div>

      <div class="btn-group">
        <button type="submit" class="btn btn-primary">Create Persona Card</button>
        <button type="reset" class="btn btn-secondary">Clear Form</button>
      </div>
    </form>
  </div>
</div>

<div id="view-gallery" style="display:none">
  <div class="actions-bar">
    <span style="font-size:14px;color:#6b7280" id="persona-count">0 personas saved</span>
    <div class="btn-group" style="margin:0">
      <button class="btn btn-secondary" onclick="exportAll()">Export All (HTML)</button>
      <button class="btn btn-secondary" onclick="clearAll()">Clear All</button>
    </div>
  </div>
  <div class="persona-cards" id="gallery-grid"></div>
  <div class="empty-state" id="empty-gallery">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    <p>No personas yet. Build your first one!</p>
  </div>
</div>

<div id="view-compare" style="display:none">
  <div class="panel" style="margin-bottom:16px">
    <label style="margin-bottom:8px">Select personas to compare (2-3):</label>
    <div id="compare-checkboxes" style="display:flex;flex-wrap:wrap;gap:8px"></div>
    <button class="btn btn-primary" style="margin-top:12px" onclick="runCompare()">Compare Selected</button>
  </div>
  <div class="compare-view" id="compare-grid"></div>
</div>

<canvas id="canvas-export" width="400" height="600"></canvas>
</div>

<script>
const TEMPLATES = {
  b2b: { pName:'Marketing Mary', pRole:'VP of Marketing at mid-size SaaS', pAge:'35-44', pIncome:'$100k-$150k', pLocation:'San Francisco, USA', pEducation:"Master's", pGoals:'Increase MQLs by 30%\nProve ROI to board\nScale content production', pFrustrations:'Too many disconnected tools\nCan\'t attribute revenue to campaigns\nSmall team, big expectations', pChannels:'LinkedIn\nIndustry podcasts\nGartner reports\nSlack communities', pQuote:'"I need data-driven tools that my whole team can use without training."', pTech:'7', pBudget:'8' },
  consumer: { pName:'Savvy Sarah', pRole:'Health-conscious millennial shopper', pAge:'25-34', pIncome:'$60k-$100k', pLocation:'Austin, TX', pEducation:"Bachelor's", pGoals:'Find quality products quickly\nSave money without sacrificing quality\nMake sustainable choices', pFrustrations:'Overwhelmed by choices\nDistrust of sponsored content\nSubscription fatigue', pChannels:'Instagram\nTikTok\nYouTube reviews\nFriend recommendations', pQuote:'"I want to buy from brands that align with my values."', pTech:'8', pBudget:'4' },
  developer: { pName:'Dev Dave', pRole:'Senior Full-Stack Developer', pAge:'25-34', pIncome:'$100k-$150k', pLocation:'Remote, USA', pEducation:'Self-taught', pGoals:'Ship features faster\nReduce technical debt\nStay current with new tools', pFrustrations:'Poor documentation\nTools that don\'t respect developer workflow\nMeetings that should be emails', pChannels:'GitHub\nHacker News\nDev.to\nDiscord\nTwitter/X', pQuote:'"If I can\'t integrate it in under 10 minutes, I\'m out."', pTech:'10', pBudget:'3' },
  enterprise: { pName:'Executive Eric', pRole:'CTO at Fortune 500', pAge:'45-54', pIncome:'$150k+', pLocation:'New York, USA', pEducation:"Master's", pGoals:'Digital transformation\nReduce vendor sprawl\nEnsure compliance & security', pFrustrations:'Long procurement cycles\nLegacy system lock-in\nGetting buy-in from stakeholders', pChannels:'Board presentations\nAnalyst reports\nExecutive peer groups\nConferences', pQuote:'"Show me the ROI in Year 1 or we\'re not having this conversation."', pTech:'5', pBudget:'10' },
  blank: { pName:'', pRole:'', pAge:'25-34', pIncome:'$60k-$100k', pLocation:'', pEducation:"Bachelor's", pGoals:'', pFrustrations:'', pChannels:'', pQuote:'', pTech:'5', pBudget:'5' }
};

let personas = JSON.parse(localStorage.getItem('fms-personas') || '[]');

function showView(v) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', t.textContent.toLowerCase().includes(v.substring(0,4))));
  document.getElementById('view-builder').style.display = v==='builder'?'block':'none';
  document.getElementById('view-gallery').style.display = v==='gallery'?'block':'none';
  document.getElementById('view-compare').style.display = v==='compare'?'block':'none';
  if(v==='gallery') renderGallery();
  if(v==='compare') renderCompareOptions();
}

function loadTemplate(key) {
  document.querySelectorAll('.template-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase().includes(key.substring(0,4)) || (key==='blank' && b.textContent==='Blank')));
  const t = TEMPLATES[key];
  Object.keys(t).forEach(k => {
    const el = document.getElementById(k);
    if(el){ el.value = t[k]; if(el.type==='range' && el.nextElementSibling) el.nextElementSibling.textContent=t[k]; }
  });
}

function createPersona(e) {
  e.preventDefault();
  const persona = {
    id: Date.now(),
    name: document.getElementById('pName').value,
    role: document.getElementById('pRole').value,
    age: document.getElementById('pAge').value,
    income: document.getElementById('pIncome').value,
    location: document.getElementById('pLocation').value,
    education: document.getElementById('pEducation').value,
    goals: document.getElementById('pGoals').value.split('\n').filter(Boolean),
    frustrations: document.getElementById('pFrustrations').value.split('\n').filter(Boolean),
    channels: document.getElementById('pChannels').value.split('\n').filter(Boolean),
    quote: document.getElementById('pQuote').value,
    tech: parseInt(document.getElementById('pTech').value),
    budget: parseInt(document.getElementById('pBudget').value)
  };
  personas.push(persona);
  save();
  showView('gallery');
}

function save() { localStorage.setItem('fms-personas', JSON.stringify(personas)); }

function renderGallery() {
  const grid = document.getElementById('gallery-grid');
  const empty = document.getElementById('empty-gallery');
  document.getElementById('persona-count').textContent = `${personas.length} persona${personas.length!==1?'s':''} saved`;
  if(!personas.length){ grid.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';
  grid.innerHTML = personas.map(p => buildCard(p)).join('');
}

function buildCard(p) {
  const initials = p.name.split(' ').map(w=>w[0]||'').join('').substring(0,2).toUpperCase();
  return `<div class="persona-card" id="card-${p.id}">
    <button class="persona-delete" onclick="deletePersona(${p.id})">x</button>
    <div class="persona-header">
      <div class="persona-avatar">${initials}</div>
      <div class="persona-name">${esc(p.name)}</div>
      <div class="persona-role">${esc(p.role)}</div>
    </div>
    <div class="persona-body">
      <div class="persona-stats">
        <div class="stat"><div class="stat-label">Age</div><div class="stat-value">${p.age}</div></div>
        <div class="stat"><div class="stat-label">Income</div><div class="stat-value">${p.income}</div></div>
        <div class="stat"><div class="stat-label">Tech</div><div class="stat-value">${p.tech}/10</div></div>
        <div class="stat"><div class="stat-label">Budget</div><div class="stat-value">${p.budget}/10</div></div>
      </div>
      <div class="persona-section" style="margin-top:16px"><h4>Goals</h4><ul>${p.goals.map(g=>`<li>${esc(g)}</li>`).join('')}</ul></div>
      <div class="persona-section"><h4>Frustrations</h4><ul>${p.frustrations.map(f=>`<li>${esc(f)}</li>`).join('')}</ul></div>
      <div class="persona-section"><h4>Channels</h4><p>${p.channels.map(c=>esc(c)).join(' / ')}</p></div>
      ${p.quote?`<div class="persona-quote">"${esc(p.quote)}"</div>`:''}
      <div class="btn-group" style="margin-top:12px">
        <button class="btn btn-secondary" onclick="downloadPNG(${p.id})" style="font-size:12px;padding:6px 12px">PNG</button>
        <button class="btn btn-secondary" onclick="downloadHTML(${p.id})" style="font-size:12px;padding:6px 12px">HTML</button>
      </div>
    </div>
  </div>`;
}

function deletePersona(id) {
  personas = personas.filter(p => p.id !== id);
  save(); renderGallery();
}

function clearAll() {
  if(!confirm('Delete all personas?')) return;
  personas = []; save(); renderGallery();
}

function downloadPNG(id) {
  const card = document.getElementById('card-'+id);
  const canvas = document.getElementById('canvas-export');
  const ctx = canvas.getContext('2d');
  const p = personas.find(x=>x.id===id);
  if(!p) return;
  canvas.width=400; canvas.height=580;
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,400,580);
  ctx.fillStyle='#f97316'; ctx.fillRect(0,0,400,140);
  ctx.fillStyle='#fff'; ctx.font='bold 22px Manrope,sans-serif'; ctx.textAlign='center';
  ctx.fillText(p.name,200,70);
  ctx.font='14px Manrope,sans-serif'; ctx.fillText(p.role,200,95);
  ctx.fillStyle='#1a1a1a'; ctx.textAlign='left'; ctx.font='bold 11px Manrope,sans-serif';
  let y=170;
  ctx.fillStyle='#f97316'; ctx.fillText('DEMOGRAPHICS',20,y);
  ctx.fillStyle='#4b5563'; ctx.font='13px Manrope,sans-serif'; y+=18;
  ctx.fillText(`Age: ${p.age} | Income: ${p.income} | ${p.location}`,20,y); y+=30;
  ctx.fillStyle='#f97316'; ctx.font='bold 11px Manrope,sans-serif'; ctx.fillText('GOALS',20,y); y+=18;
  ctx.fillStyle='#4b5563'; ctx.font='13px Manrope,sans-serif';
  p.goals.slice(0,3).forEach(g=>{ ctx.fillText('> '+g.substring(0,45),20,y); y+=18; }); y+=12;
  ctx.fillStyle='#f97316'; ctx.font='bold 11px Manrope,sans-serif'; ctx.fillText('FRUSTRATIONS',20,y); y+=18;
  ctx.fillStyle='#4b5563'; ctx.font='13px Manrope,sans-serif';
  p.frustrations.slice(0,3).forEach(f=>{ ctx.fillText('> '+f.substring(0,45),20,y); y+=18; }); y+=12;
  ctx.fillStyle='#f97316'; ctx.font='bold 11px Manrope,sans-serif'; ctx.fillText('CHANNELS',20,y); y+=18;
  ctx.fillStyle='#4b5563'; ctx.font='13px Manrope,sans-serif';
  ctx.fillText(p.channels.join(', ').substring(0,55),20,y); y+=30;
  if(p.quote){ ctx.fillStyle='#6b7280'; ctx.font='italic 12px Manrope,sans-serif'; ctx.fillText('"'+p.quote.substring(0,50)+'"',20,y); }
  const link = document.createElement('a');
  link.download = p.name.replace(/\s+/g,'-').toLowerCase()+'-persona.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function downloadHTML(id) {
  const card = document.getElementById('card-'+id);
  if(!card) return;
  const p = personas.find(x=>x.id===id);
  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${esc(p.name)} Persona</title><style>body{font-family:Manrope,sans-serif;background:#fafafa;padding:40px;display:flex;justify-content:center}.card{max-width:400px;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.08)}</style>
</head><body><div class="card">${card.innerHTML}</div></body></html>`;
  const blob = new Blob([html],{type:'text/html'});
  const link = document.createElement('a');
  link.download = p.name.replace(/\s+/g,'-').toLowerCase()+'-persona.html';
  link.href = URL.createObjectURL(blob);
  link.click();
}

function exportAll() {
  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>All Personas</title><style>body{font-family:Manrope,sans-serif;background:#fafafa;padding:40px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:20px}</style>
</head><body><h1>Customer Personas</h1><div class="grid">${personas.map(p=>buildCard(p)).join('')}</div></body></html>`;
  const blob = new Blob([html],{type:'text/html'});
  const link = document.createElement('a');
  link.download = 'all-personas.html';
  link.href = URL.createObjectURL(blob);
  link.click();
}

function renderCompareOptions() {
  const box = document.getElementById('compare-checkboxes');
  if(!personas.length){ box.innerHTML='<span style="color:#6b7280;font-size:13px">No personas to compare. Create some first.</span>'; return; }
  box.innerHTML = personas.map(p=>`<label style="display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer"><input type="checkbox" value="${p.id}"> ${esc(p.name)}</label>`).join('');
}

function runCompare() {
  const checked = [...document.querySelectorAll('#compare-checkboxes input:checked')].map(c=>parseInt(c.value));
  if(checked.length<2){ alert('Select at least 2 personas'); return; }
  const selected = personas.filter(p=>checked.includes(p.id)).slice(0,3);
  document.getElementById('compare-grid').innerHTML = selected.map(p=>buildCard(p)).join('');
}

function esc(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

loadTemplate('b2b');
</script>
<script src="/related.js"></script>
</body>
</html>
