<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Value Proposition Canvas - FreeMarketingStore</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Manrope',system-ui,sans-serif;background:#fafafa;color:#1a1a1a;min-height:100vh;padding:24px}
a{color:#f97316;text-decoration:none}
a:hover{text-decoration:underline}
.back{display:inline-block;margin-bottom:20px;font-size:14px;font-weight:500}
h1{font-size:28px;font-weight:800;margin-bottom:8px}
.subtitle{color:#6b7280;margin-bottom:24px;font-size:15px}
.container{max-width:1200px;margin:0 auto}
.panel{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:24px;margin-bottom:20px}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:#f97316;color:#fff}
.btn-primary:hover{background:#ea580c}
.btn-secondary{background:#fff;color:#1a1a1a;border:1px solid #e5e7eb}
.btn-secondary:hover{border-color:#f97316}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-group{display:flex;gap:8px;flex-wrap:wrap}
.toolbar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.canvas-layout{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
@media(max-width:768px){.canvas-layout{grid-template-columns:1fr}}
.side{border-radius:12px;overflow:hidden;border:2px solid}
.side.customer{border-color:#3b82f6}
.side.value{border-color:#f97316}
.side-header{padding:16px 20px;color:#fff;font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px}
.side.customer .side-header{background:#3b82f6}
.side.value .side-header{background:#f97316}
.side-body{background:#fff;padding:16px}
.section{margin-bottom:16px}
.section:last-child{margin-bottom:0}
.section-header{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.section-header h4{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.side.customer .section-header h4{color:#3b82f6}
.side.value .section-header h4{color:#f97316}
.section-icon{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff}
.side.customer .section-icon{background:#3b82f6}
.side.value .section-icon{background:#f97316}
.items{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;min-height:32px;padding:6px;border:1px dashed #e5e7eb;border-radius:8px}
.item{padding:5px 10px;border-radius:6px;font-size:12px;font-weight:500;cursor:grab;display:flex;align-items:center;gap:4px;transition:all .15s;user-select:none}
.item:active{cursor:grabbing;opacity:.7}
.side.customer .item{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe}
.side.value .item{background:#fff7ed;color:#ea580c;border:1px solid #fed7aa}
.item .remove{background:none;border:none;cursor:pointer;font-size:12px;color:inherit;opacity:.5;padding:0 2px}
.item .remove:hover{opacity:1}
.item.matched{box-shadow:0 0 0 2px #10b981;position:relative}
.add-row{display:flex;gap:6px}
.add-row input{flex:1;padding:7px 10px;border:1px solid #e5e7eb;border-radius:6px;font-size:12px;font-family:inherit}
.add-row input:focus{outline:none;border-color:#f97316}
.add-row button{padding:7px 12px;border:none;background:#f97316;color:#fff;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600}
.fit-section{margin-top:24px}
.fit-section h2{font-size:18px;font-weight:800;margin-bottom:16px}
.fit-indicators{display:flex;flex-direction:column;gap:10px}
.fit-row{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#fff;border:1px solid #e5e7eb;border-radius:8px;font-size:13px}
.fit-row .arrow{color:#10b981;font-weight:700;font-size:16px}
.fit-row .label-left{color:#3b82f6;font-weight:600;flex:1}
.fit-row .label-right{color:#f97316;font-weight:600;flex:1;text-align:right}
.fit-score{text-align:center;margin-top:16px;padding:20px;background:#fff;border:1px solid #e5e7eb;border-radius:12px}
.fit-score .number{font-size:48px;font-weight:800;color:#f97316}
.fit-score .label{font-size:13px;color:#6b7280;margin-top:4px}
.no-fit{text-align:center;padding:24px;color:#6b7280;font-size:13px}
.drag-over{background:#fff7ed !important;border-color:#f97316 !important}
#export-canvas{position:absolute;left:-9999px}
</style>
</head>
<body>
<div class="container">
<a class="back" href="/">Back to Store</a>
<h1>Value Proposition Canvas</h1>
<p class="subtitle">Align what you offer with what your customer truly needs</p>

<div class="toolbar">
  <div class="btn-group">
    <button class="btn btn-primary btn-sm" onclick="findFit()">Show Fit</button>
    <button class="btn btn-secondary btn-sm" onclick="exportPNG()">Export PNG</button>
    <button class="btn btn-secondary btn-sm" onclick="resetAll()">Reset</button>
  </div>
</div>

<div class="canvas-layout">
  <div class="side customer">
    <div class="side-header">Customer Profile</div>
    <div class="side-body">
      <div class="section">
        <div class="section-header"><div class="section-icon">J</div><h4>Customer Jobs</h4></div>
        <div class="items" id="items-jobs" data-section="jobs"></div>
        <div class="add-row">
          <input placeholder="What are they trying to get done?" id="input-jobs" onkeydown="if(event.key==='Enter')addItem('jobs')">
          <button onclick="addItem('jobs')">+</button>
        </div>
      </div>
      <div class="section">
        <div class="section-header"><div class="section-icon">P</div><h4>Pains</h4></div>
        <div class="items" id="items-pains" data-section="pains"></div>
        <div class="add-row">
          <input placeholder="What frustrates or blocks them?" id="input-pains" onkeydown="if(event.key==='Enter')addItem('pains')">
          <button onclick="addItem('pains')">+</button>
        </div>
      </div>
      <div class="section">
        <div class="section-header"><div class="section-icon">G</div><h4>Gains</h4></div>
        <div class="items" id="items-gains" data-section="gains"></div>
        <div class="add-row">
          <input placeholder="What outcomes do they desire?" id="input-gains" onkeydown="if(event.key==='Enter')addItem('gains')">
          <button onclick="addItem('gains')">+</button>
        </div>
      </div>
    </div>
  </div>

  <div class="side value">
    <div class="side-header">Value Map</div>
    <div class="side-body">
      <div class="section">
        <div class="section-header"><div class="section-icon">P</div><h4>Products & Services</h4></div>
        <div class="items" id="items-products" data-section="products"></div>
        <div class="add-row">
          <input placeholder="What do you offer?" id="input-products" onkeydown="if(event.key==='Enter')addItem('products')">
          <button onclick="addItem('products')">+</button>
        </div>
      </div>
      <div class="section">
        <div class="section-header"><div class="section-icon">R</div><h4>Pain Relievers</h4></div>
        <div class="items" id="items-relievers" data-section="relievers"></div>
        <div class="add-row">
          <input placeholder="How do you alleviate pains?" id="input-relievers" onkeydown="if(event.key==='Enter')addItem('relievers')">
          <button onclick="addItem('relievers')">+</button>
        </div>
      </div>
      <div class="section">
        <div class="section-header"><div class="section-icon">C</div><h4>Gain Creators</h4></div>
        <div class="items" id="items-creators" data-section="creators"></div>
        <div class="add-row">
          <input placeholder="How do you create gains?" id="input-creators" onkeydown="if(event.key==='Enter')addItem('creators')">
          <button onclick="addItem('creators')">+</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="fit-section" id="fit-section" style="display:none">
  <h2>Fit Analysis</h2>
  <div class="fit-indicators" id="fit-indicators"></div>
  <div class="fit-score" id="fit-score"></div>
</div>
</div>

<canvas id="export-canvas"></canvas>

<script>
const sections = ['jobs','pains','gains','products','relievers','creators'];
let data = {};
sections.forEach(s => data[s] = []);

function loadData() {
  const saved = localStorage.getItem('fms-vp-canvas');
  if (saved) data = JSON.parse(saved);
  render();
}

function saveData() {
  localStorage.setItem('fms-vp-canvas', JSON.stringify(data));
}

function render() {
  sections.forEach(s => {
    const container = document.getElementById('items-' + s);
    container.innerHTML = data[s].map((item, i) => `
      <div class="item" draggable="true" data-section="${s}" data-index="${i}"
           ondragstart="onDragStart(event)" ondragend="onDragEnd(event)">
        ${esc(item)}
        <button class="remove" onclick="removeItem('${s}',${i})">x</button>
      </div>
    `).join('');
  });
  setupDropZones();
}

function addItem(section) {
  const input = document.getElementById('input-' + section);
  const val = input.value.trim();
  if (!val) return;
  data[section].push(val);
  input.value = '';
  saveData();
  render();
}

function removeItem(section, idx) {
  data[section].splice(idx, 1);
  saveData();
  render();
}

function resetAll() {
  if (!confirm('Clear the entire canvas?')) return;
  sections.forEach(s => data[s] = []);
  document.getElementById('fit-section').style.display = 'none';
  saveData();
  render();
}

let dragData = null;

function onDragStart(e) {
  dragData = { section: e.target.dataset.section, index: parseInt(e.target.dataset.index) };
  e.target.style.opacity = '0.5';
  e.dataTransfer.effectAllowed = 'move';
}

function onDragEnd(e) {
  e.target.style.opacity = '1';
  dragData = null;
  document.querySelectorAll('.items').forEach(el => el.classList.remove('drag-over'));
}

function setupDropZones() {
  document.querySelectorAll('.items').forEach(zone => {
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('drag-over');
      if (!dragData) return;
      const targetSection = zone.dataset.section;
      const item = data[dragData.section][dragData.index];
      if (!item) return;
      data[dragData.section].splice(dragData.index, 1);
      data[targetSection].push(item);
      saveData();
      render();
    });
  });
}

function findFit() {
  const section = document.getElementById('fit-section');
  const indicators = document.getElementById('fit-indicators');
  const scoreEl = document.getElementById('fit-score');

  const pains = data.pains;
  const gains = data.gains;
  const relievers = data.relievers;
  const creators = data.creators;

  if (!pains.length && !gains.length) {
    section.style.display = 'block';
    indicators.innerHTML = '<div class="no-fit">Add customer pains and gains, then pain relievers and gain creators to see fit.</div>';
    scoreEl.innerHTML = '';
    return;
  }

  let matches = [];
  let totalPossible = pains.length + gains.length;
  let matched = 0;

  pains.forEach(pain => {
    const words = pain.toLowerCase().split(/\s+/);
    const match = relievers.find(r => {
      const rWords = r.toLowerCase().split(/\s+/);
      return words.some(w => w.length > 3 && rWords.some(rw => rw.includes(w) || w.includes(rw)));
    });
    if (match) {
      matches.push({ left: pain, right: match, type: 'pain-reliever' });
      matched++;
    }
  });

  gains.forEach(gain => {
    const words = gain.toLowerCase().split(/\s+/);
    const match = creators.find(c => {
      const cWords = c.toLowerCase().split(/\s+/);
      return words.some(w => w.length > 3 && cWords.some(cw => cw.includes(w) || w.includes(cw)));
    });
    if (match) {
      matches.push({ left: gain, right: match, type: 'gain-creator' });
      matched++;
    }
  });

  // Also count items that exist even without keyword match
  const painCoverage = relievers.length ? Math.min(pains.length, relievers.length) : 0;
  const gainCoverage = creators.length ? Math.min(gains.length, creators.length) : 0;
  const coverageScore = totalPossible > 0 ? Math.round(((painCoverage + gainCoverage) / totalPossible) * 100) : 0;

  section.style.display = 'block';

  if (matches.length) {
    indicators.innerHTML = matches.map(m => `
      <div class="fit-row">
        <span class="label-left">${esc(m.left)}</span>
        <span class="arrow">${m.type === 'pain-reliever' ? 'Pain &#8594; Relief' : 'Gain &#8594; Created'}</span>
        <span class="label-right">${esc(m.right)}</span>
      </div>
    `).join('');
  } else {
    indicators.innerHTML = `<div class="no-fit">No direct keyword matches found between pains/gains and relievers/creators. Try using similar terms on both sides.</div>`;
  }

  const unaddressedPains = pains.length - painCoverage;
  const unaddressedGains = gains.length - gainCoverage;
  let advice = '';
  if (unaddressedPains > 0) advice += `${unaddressedPains} pain${unaddressedPains > 1 ? 's' : ''} without relievers. `;
  if (unaddressedGains > 0) advice += `${unaddressedGains} gain${unaddressedGains > 1 ? 's' : ''} without creators.`;

  scoreEl.innerHTML = `
    <div class="number">${coverageScore}%</div>
    <div class="label">Coverage Score (${painCoverage + gainCoverage} of ${totalPossible} needs addressed)</div>
    ${advice ? `<p style="margin-top:8px;font-size:12px;color:#6b7280">${advice}</p>` : ''}
  `;
}

function exportPNG() {
  const canvas = document.getElementById('export-canvas');
  const ctx = canvas.getContext('2d');
  const w = 1000, h = 600;
  canvas.width = w; canvas.height = h;
  ctx.fillStyle = '#fafafa'; ctx.fillRect(0, 0, w, h);

  ctx.fillStyle = '#1a1a1a'; ctx.font = 'bold 20px Manrope,sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('Value Proposition Canvas', w / 2, 32);

  // Customer side
  ctx.fillStyle = '#3b82f6'; ctx.font = 'bold 15px Manrope,sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('CUSTOMER PROFILE', 30, 65);
  const custSections = [
    { label: 'Jobs', items: data.jobs },
    { label: 'Pains', items: data.pains },
    { label: 'Gains', items: data.gains }
  ];
  let y = 90;
  custSections.forEach(s => {
    ctx.fillStyle = '#3b82f6'; ctx.font = 'bold 11px Manrope,sans-serif';
    ctx.fillText(s.label.toUpperCase(), 30, y); y += 16;
    ctx.fillStyle = '#4b5563'; ctx.font = '12px Manrope,sans-serif';
    s.items.slice(0, 5).forEach(item => { ctx.fillText('- ' + item.substring(0, 40), 40, y); y += 16; });
    y += 10;
  });

  // Value side
  ctx.fillStyle = '#f97316'; ctx.font = 'bold 15px Manrope,sans-serif';
  ctx.fillText('VALUE MAP', 530, 65);
  const valSections = [
    { label: 'Products & Services', items: data.products },
    { label: 'Pain Relievers', items: data.relievers },
    { label: 'Gain Creators', items: data.creators }
  ];
  y = 90;
  valSections.forEach(s => {
    ctx.fillStyle = '#f97316'; ctx.font = 'bold 11px Manrope,sans-serif';
    ctx.fillText(s.label.toUpperCase(), 530, y); y += 16;
    ctx.fillStyle = '#4b5563'; ctx.font = '12px Manrope,sans-serif';
    s.items.slice(0, 5).forEach(item => { ctx.fillText('- ' + item.substring(0, 40), 540, y); y += 16; });
    y += 10;
  });

  // Divider
  ctx.strokeStyle = '#e5e7eb'; ctx.setLineDash([4, 4]); ctx.beginPath();
  ctx.moveTo(w / 2, 55); ctx.lineTo(w / 2, h - 20); ctx.stroke();

  const link = document.createElement('a');
  link.download = 'value-proposition-canvas.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

loadData();
</script>
<script src="/related.js"></script>
</body>
</html>
